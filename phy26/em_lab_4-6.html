<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#e2e8f0;display:flex;flex-direction:column;overflow:hidden}
  #topbar{display:flex;align-items:center;gap:14px;padding:10px 20px;background:rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(8px);flex-shrink:0;z-index:10}
  #topbar a.back-btn{text-decoration:none;color:#fbbf24;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:8px;padding:5px 13px;font-size:13px;transition:background .2s}
  #topbar a.back-btn:hover{background:rgba(251,191,36,0.22)}
  .topbar-title-wrap{display:flex;flex-direction:column;gap:2px}
  .topbar-title{font-size:16px;font-weight:700;color:#fff}
  .topbar-course{font-size:11px;color:rgba(255,255,255,0.38);letter-spacing:1px}
  .topbar-sub{margin-left:auto;font-size:12px;color:rgba(255,255,255,0.3)}
  #main{display:flex;flex:1;overflow:hidden}
  #sidebar{width:260px;flex-shrink:0;background:rgba(255,255,255,0.04);border-right:1px solid rgba(255,255,255,0.08);overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:14px}
  #sidebar::-webkit-scrollbar{width:4px}
  #sidebar::-webkit-scrollbar-thumb{background:rgba(251,191,36,0.3);border-radius:2px}
  .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#fbbf24;margin-bottom:6px;border-bottom:1px solid rgba(251,191,36,0.2);padding-bottom:4px}
  .exp-btn{width:100%;text-align:left;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 14px;cursor:pointer;color:rgba(255,255,255,0.7);font-size:13px;font-family:'Microsoft YaHei',sans-serif;transition:all .2s;display:flex;align-items:center;gap:10px}
  .exp-btn:hover{background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3);color:#fff}
  .exp-btn.active{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.5);color:#fbbf24;font-weight:600}
  .exp-icon{font-size:18px;flex-shrink:0}
  .exp-info{display:flex;flex-direction:column;gap:2px}
  .exp-name{font-size:13px;font-weight:600}
  .exp-desc{font-size:11px;color:rgba(255,255,255,0.4)}
  .ctrl-group{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px}
  .ctrl-label{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.8px;margin-bottom:8px;font-family:'Microsoft YaHei',sans-serif}
  .slider-wrap{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .slider-wrap label{font-size:12px;color:rgba(255,255,255,0.6);min-width:60px;font-family:'Microsoft YaHei',sans-serif}
  .slider-wrap input[type=range]{flex:1;accent-color:#fbbf24;height:4px}
  .slider-wrap span{font-size:12px;color:#fbbf24;font-weight:600;min-width:52px;text-align:right}
  .action-btn{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(251,191,36,0.3);background:rgba(251,191,36,0.1);color:#fbbf24;font-size:13px;font-family:'Microsoft YaHei',sans-serif;cursor:pointer;transition:all .2s;margin-top:4px}
  .action-btn:hover{background:rgba(251,191,36,0.25);border-color:rgba(251,191,36,0.6);color:#fff}
  .action-btn.primary{background:linear-gradient(135deg,#f59e0b,#fbbf24);border-color:transparent;color:#1a1200;font-weight:700}
  .readout-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
  .readout{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:8px 10px;text-align:center}
  .readout-val{font-size:16px;font-weight:800;color:#fbbf24;font-family:'Times New Roman',serif}
  .readout-label{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;letter-spacing:0.5px}
  #canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #exp-title-bar{padding:10px 20px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:12px;flex-shrink:0}
  #exp-title{font-size:15px;font-weight:700;color:#fbbf24;font-family:'Microsoft YaHei',sans-serif}
  #exp-subtitle{font-size:12px;color:rgba(255,255,255,0.4)}
  #canvas-wrap{flex:1;overflow:hidden}
  canvas#simCanvas{display:block;width:100%;height:100%;background:rgba(0,0,0,0.3)}
  #info-bar{padding:8px 20px;background:rgba(0,0,0,0.2);border-top:1px solid rgba(255,255,255,0.06);font-size:12px;color:rgba(255,255,255,0.4);font-family:'Microsoft YaHei',sans-serif;flex-shrink:0}
</style>
</head>
<body>
<div id="topbar">
  <a class="back-btn" href="em.html">← 电磁学</a>
  <div class="topbar-title-wrap">
    <div class="topbar-title">§4-6 麦克斯韦方程组 · 电磁波</div>
    <div class="topbar-course">普通物理（卓越班）下册 · 电磁学 · 仿真实验</div>
  </div>
  <div class="topbar-sub">NUSEP26</div>
</div>
<div id="main">
  <div id="sidebar">
    <div>
      <div class="section-title">实验选择</div>
      <button class="exp-btn active" onclick="loadExp(0)">
        <span class="exp-icon">🌊</span>
        <div class="exp-info"><div class="exp-name">平面电磁波</div><div class="exp-desc">E、H 同相位，横波</div></div>
      </button>
      <button class="exp-btn" onclick="loadExp(1)">
        <span class="exp-icon">⚡</span>
        <div class="exp-info"><div class="exp-name">坡印廷矢量</div><div class="exp-desc">S = E × H，能流密度</div></div>
      </button>
      <button class="exp-btn" onclick="loadExp(2)">
        <span class="exp-icon">🌈</span>
        <div class="exp-info"><div class="exp-name">电磁波谱</div><div class="exp-desc">频率与波长的关系</div></div>
      </button>
    </div>
    <div id="ctrl-panel"></div>
    <div class="readout-grid">
      <div class="readout"><div class="readout-val" id="ro1">—</div><div class="readout-label" id="ro1l">E (归一化)</div></div>
      <div class="readout"><div class="readout-val" id="ro2">—</div><div class="readout-label" id="ro2l">H (归一化)</div></div>
      <div class="readout"><div class="readout-val" id="ro3">—</div><div class="readout-label" id="ro3l">|S| (归一化)</div></div>
      <div class="readout"><div class="readout-val" id="ro4">—</div><div class="readout-label" id="ro4l">λ (归一化)</div></div>
    </div>
    <div style="margin-top:auto;padding-top:12px"><button onclick="openReport()" style="width:100%;padding:10px;border-radius:10px;border:1px solid rgba(52,211,153,0.4);background:rgba(52,211,153,0.1);color:#34d399;font-size:13px;font-family:'Microsoft YaHei',sans-serif;cursor:pointer;font-weight:700;">📄 生成实验报告</button></div>
  </div>
  <div id="canvas-area">
    <div id="exp-title-bar">
      <div id="exp-title">平面电磁波传播</div>
      <div id="exp-subtitle">E 与 H 同相位，互相垂直，均垂直于传播方向</div>
    </div>
    <div id="canvas-wrap"><canvas id="simCanvas"></canvas></div>
    <div id="info-bar">提示：点击"播放"观察电磁波传播，调节频率和振幅</div>
  </div>
</div>
<script>
const canvas=document.getElementById('simCanvas');
const ctx=canvas.getContext('2d');
let animId=null,simT=0,curExp=0;

const EXPS=[
  {title:'平面电磁波传播',subtitle:'E 与 H 同相位，互相垂直，均垂直于传播方向（横波）',
   ctrls:`<div class="ctrl-group"><div class="ctrl-label">参数控制</div>
    <div class="slider-wrap"><label>频率 f</label><input type="range" id="p0_f" min="0.5" max="5" step="0.5" value="2" oninput="redraw()"><span id="p0_f_v">2.0</span></div>
    <div class="slider-wrap"><label>振幅 E₀</label><input type="range" id="p0_A" min="0.2" max="2" step="0.1" value="1" oninput="redraw()"><span id="p0_A_v">1.0</span></div>
    <button class="action-btn primary" onclick="toggleAnim()">▶ 播放</button>
    <button class="action-btn" onclick="resetSim()">重置</button></div>`,
   ro:['E (归一化)','H (归一化)','|S| (归一化)','λ (归一化)']},
  {title:'坡印廷矢量 S = E × H',subtitle:'电磁波能流密度，方向为传播方向，大小 |S| = EH',
   ctrls:`<div class="ctrl-group"><div class="ctrl-label">参数控制</div>
    <div class="slider-wrap"><label>频率 f</label><input type="range" id="p1_f" min="0.5" max="4" step="0.5" value="1.5" oninput="redraw()"><span id="p1_f_v">1.5</span></div>
    <div class="slider-wrap"><label>振幅 E₀</label><input type="range" id="p1_A" min="0.3" max="2" step="0.1" value="1" oninput="redraw()"><span id="p1_A_v">1.0</span></div>
    <button class="action-btn primary" onclick="toggleAnim()">▶ 播放</button></div>`,
   ro:['E','H','|S|=EH','t']},
  {title:'电磁波谱',subtitle:'不同频率的电磁波：无线电波、微波、红外、可见光、紫外、X射线、γ射线',
   ctrls:`<div class="ctrl-group"><div class="ctrl-label">参数控制</div>
    <div class="slider-wrap"><label>log₁₀(f/Hz)</label><input type="range" id="p2_logf" min="3" max="22" step="0.5" value="14" oninput="redraw()"><span id="p2_logf_v">10¹⁴ Hz</span></div></div>`,
   ro:['频率 (Hz)','波长 (m)','类型','能量 (eV)']}
];

function loadExp(i){
  curExp=i;simT=0;
  if(animId){cancelAnimationFrame(animId);animId=null;}
  document.querySelectorAll('.exp-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.getElementById('exp-title').textContent=EXPS[i].title;
  document.getElementById('exp-subtitle').textContent=EXPS[i].subtitle;
  document.getElementById('ctrl-panel').innerHTML=EXPS[i].ctrls;
  const ro=EXPS[i].ro;
  ['ro1l','ro2l','ro3l','ro4l'].forEach((id,j)=>document.getElementById(id).textContent=ro[j]);
  redraw();
}
function toggleAnim(){
  if(animId){cancelAnimationFrame(animId);animId=null;return;}
  function frame(){simT+=0.016;redraw();animId=requestAnimationFrame(frame);}
  frame();
}
function resetSim(){simT=0;if(animId){cancelAnimationFrame(animId);animId=null;}redraw();}
function gv(id){const el=document.getElementById(id);return el?parseFloat(el.value):0;}
function sv(id,txt){const el=document.getElementById(id);if(el)el.textContent=txt;}
function ro(i,v){const el=document.getElementById('ro'+(i+1));if(el)el.textContent=v;}

function redraw(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(curExp===0)drawWave(W,H);
  else if(curExp===1)drawPoynting(W,H);
  else drawSpectrum(W,H);
}

function drawWave(W,H){
  const f=gv('p0_f')||2,A=gv('p0_A')||1;
  sv('p0_f_v',f.toFixed(1));sv('p0_A_v',A.toFixed(1));
  const omega=2*Math.PI*f,k=2*Math.PI*f;
  const pad={l:30,r:20,t:30,b:30};
  const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  const cy=pad.t+gH/2,amp=gH*0.35*A;
  // Axes
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,cy);ctx.lineTo(pad.l+gW,cy);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='11px "Microsoft YaHei"';ctx.textAlign='left';
  ctx.fillText('x →（传播方向）',pad.l+gW-100,cy-8);
  // E_y (gold)
  ctx.strokeStyle='rgba(251,191,36,0.9)';ctx.lineWidth=2.5;ctx.beginPath();
  for(let px=0;px<=gW;px++){
    const x=px/gW*4;
    const Ey=A*Math.cos(omega*simT-k*x);
    const y=cy-Ey*amp;
    px===0?ctx.moveTo(pad.l+px,y):ctx.lineTo(pad.l+px,y);
  }
  ctx.stroke();
  // H_z (blue)
  ctx.strokeStyle='rgba(56,189,248,0.85)';ctx.lineWidth=2;ctx.beginPath();
  for(let px=0;px<=gW;px++){
    const x=px/gW*4;
    const Hz=A*Math.cos(omega*simT-k*x);
    const y=cy-Hz*amp*0.65;
    px===0?ctx.moveTo(pad.l+px,y):ctx.lineTo(pad.l+px,y);
  }
  ctx.stroke();
  // Vertical E arrows at sample points
  const nSamp=10;
  for(let i=0;i<nSamp;i++){
    const px=gW*(i+0.5)/nSamp;
    const x=px/gW*4;
    const Ey=A*Math.cos(omega*simT-k*x);
    const arrowLen=Ey*amp*0.8;
    if(Math.abs(arrowLen)>3){
      ctx.strokeStyle='rgba(251,191,36,0.5)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(pad.l+px,cy);ctx.lineTo(pad.l+px,cy-arrowLen);ctx.stroke();
    }
  }
  // Legend
  ctx.font='12px "Microsoft YaHei"';ctx.textAlign='left';
  ctx.fillStyle='rgba(251,191,36,0.9)';ctx.fillText('E_y（电场）',pad.l+8,pad.t+16);
  ctx.fillStyle='rgba(56,189,248,0.85)';ctx.fillText('H_z（磁场）',pad.l+100,pad.t+16);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillText('E ⊥ H ⊥ x，同相位',pad.l+8,pad.t+gH-8);
  const Ecur=A*Math.cos(omega*simT);
  const lam=(1/f).toFixed(2);
  ro(0,Ecur.toFixed(2));ro(1,Ecur.toFixed(2));ro(2,(Ecur*Ecur).toFixed(2));ro(3,lam);
}

function drawPoynting(W,H){
  const f=gv('p1_f')||1.5,A=gv('p1_A')||1;
  sv('p1_f_v',f.toFixed(1));sv('p1_A_v',A.toFixed(1));
  const omega=2*Math.PI*f,k=2*Math.PI*f;
  const pad={l:30,r:20,t:30,b:50};
  const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  const cy=pad.t+gH/2,amp=gH*0.28*A;
  // Axes
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,cy);ctx.lineTo(pad.l+gW,cy);ctx.stroke();
  // E curve (gold)
  ctx.strokeStyle='rgba(251,191,36,0.85)';ctx.lineWidth=2;ctx.beginPath();
  for(let px=0;px<=gW;px++){
    const x=px/gW*4;
    const Ey=A*Math.cos(omega*simT-k*x);
    const y=cy-Ey*amp;
    px===0?ctx.moveTo(pad.l+px,y):ctx.lineTo(pad.l+px,y);
  }
  ctx.stroke();
  // H curve (blue)
  ctx.strokeStyle='rgba(56,189,248,0.8)';ctx.lineWidth=2;ctx.beginPath();
  for(let px=0;px<=gW;px++){
    const x=px/gW*4;
    const Hz=A*Math.cos(omega*simT-k*x);
    const y=cy-Hz*amp*0.6;
    px===0?ctx.moveTo(pad.l+px,y):ctx.lineTo(pad.l+px,y);
  }
  ctx.stroke();
  // S = E*H curve (green, below axis)
  const Sbase=cy+gH*0.3;
  ctx.strokeStyle='rgba(52,211,153,0.85)';ctx.lineWidth=2.5;ctx.beginPath();
  for(let px=0;px<=gW;px++){
    const x=px/gW*4;
    const Ey=A*Math.cos(omega*simT-k*x);
    const S=Ey*Ey; // S ∝ E²
    const y=Sbase-S*amp*0.5;
    px===0?ctx.moveTo(pad.l+px,y):ctx.lineTo(pad.l+px,y);
  }
  ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,Sbase);ctx.lineTo(pad.l+gW,Sbase);ctx.stroke();
  // Poynting arrows
  const nArr=8;
  for(let i=0;i<nArr;i++){
    const px=gW*(i+0.5)/nArr;
    const x=px/gW*4;
    const Ey=A*Math.cos(omega*simT-k*x);
    const S=Ey*Ey;
    const len=S*35*A;
    if(len>4){
      ctx.strokeStyle='rgba(52,211,153,0.7)';ctx.fillStyle='rgba(52,211,153,0.7)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(pad.l+px,Sbase+12);ctx.lineTo(pad.l+px+len,Sbase+12);ctx.stroke();
      ctx.beginPath();ctx.moveTo(pad.l+px+len,Sbase+12);ctx.lineTo(pad.l+px+len-6,Sbase+8);ctx.lineTo(pad.l+px+len-6,Sbase+16);ctx.closePath();ctx.fill();
    }
  }
  // Legend
  ctx.font='12px "Microsoft YaHei"';ctx.textAlign='left';
  ctx.fillStyle='rgba(251,191,36,0.9)';ctx.fillText('E',pad.l+8,pad.t+16);
  ctx.fillStyle='rgba(56,189,248,0.85)';ctx.fillText('H',pad.l+28,pad.t+16);
  ctx.fillStyle='rgba(52,211,153,0.85)';ctx.fillText('S = E×H（能流）',pad.l+50,pad.t+16);
  const Ecur=A*Math.cos(omega*simT);
  ro(0,Ecur.toFixed(2));ro(1,Ecur.toFixed(2));ro(2,(Ecur*Ecur).toFixed(2));ro(3,(simT).toFixed(2));
}

function drawSpectrum(W,H){
  const logf=gv('p2_logf')||14;
  const f=Math.pow(10,logf);
  const c=3e8;
  const lam=c/f;
  const h=6.626e-34,eV=1.6e-19;
  const E=h*f/eV;
  // Spectrum bar
  const bands=[
    {name:'无线电波',logMin:3,logMax:9,col:'rgba(192,132,252,0.7)'},
    {name:'微波',logMin:9,logMax:11,col:'rgba(56,189,248,0.7)'},
    {name:'红外线',logMin:11,logMax:14.4,col:'rgba(248,113,113,0.7)'},
    {name:'可见光',logMin:14.4,logMax:14.8,col:'rgba(251,191,36,0.9)'},
    {name:'紫外线',logMin:14.8,logMax:17,col:'rgba(167,139,250,0.7)'},
    {name:'X 射线',logMin:17,logMax:20,col:'rgba(52,211,153,0.7)'},
    {name:'γ 射线',logMin:20,logMax:22,col:'rgba(248,113,113,0.9)'}
  ];
  const bx=W*0.06,by=H*0.2,bW=W*0.88,bH=50;
  const logMin=3,logMax=22,logRange=logMax-logMin;
  bands.forEach(b=>{
    const x1=bx+(b.logMin-logMin)/logRange*bW;
    const x2=bx+(b.logMax-logMin)/logRange*bW;
    ctx.fillStyle=b.col;ctx.fillRect(x1,by,x2-x1,bH);
    if(x2-x1>30){
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.font='10px "Microsoft YaHei"';ctx.textAlign='center';
      ctx.fillText(b.name,(x1+x2)/2,by+bH/2+4);
    }
  });
  // Cursor
  const cx=bx+(logf-logMin)/logRange*bW;
  ctx.strokeStyle='#fff';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx,by-8);ctx.lineTo(cx,by+bH+8);ctx.stroke();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(cx,by-8);ctx.lineTo(cx-5,by-16);ctx.lineTo(cx+5,by-16);ctx.closePath();ctx.fill();
  // Axis labels
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px Times New Roman';ctx.textAlign='center';
  for(let lg=3;lg<=22;lg+=3){
    const x=bx+(lg-logMin)/logRange*bW;
    ctx.fillText('10^'+lg,x,by+bH+14);
  }
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='11px "Microsoft YaHei"';ctx.textAlign='center';
  ctx.fillText('频率 f (Hz)',bx+bW/2,by+bH+28);
  // Info box
  const type=bands.find(b=>logf>=b.logMin&&logf<b.logMax);
  const typeName=type?type.name:'—';
  ctx.fillStyle='rgba(251,191,36,0.9)';ctx.font='bold 14px "Microsoft YaHei"';ctx.textAlign='center';
  ctx.fillText('当前：'+typeName,W/2,by+bH+56);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='13px "Microsoft YaHei"';
  ctx.fillText('f = 10^'+logf.toFixed(1)+' Hz',W/2,by+bH+76);
  ctx.fillText('λ = '+formatSci(lam)+' m',W/2,by+bH+96);
  ctx.fillText('E = '+formatSci(E)+' eV',W/2,by+bH+116);
  sv('p2_logf_v','10^'+logf.toFixed(1)+' Hz');
  ro(0,formatSci(f));ro(1,formatSci(lam));ro(2,typeName);ro(3,formatSci(E));
}

function formatSci(v){
  if(v===0)return '0';
  const exp=Math.floor(Math.log10(Math.abs(v)));
  const man=(v/Math.pow(10,exp)).toFixed(2);
  return man+'×10^'+exp;
}

function resizeCanvas(){const w=canvas.parentElement;canvas.width=w.clientWidth;canvas.height=w.clientHeight;redraw();}
window.addEventListener('resize',resizeCanvas);
window.addEventListener('DOMContentLoaded',()=>{loadExp(0);setTimeout(resizeCanvas,80);});
</script>

<script>
(function(){
  const EXP_NAME='麦克斯韦方程组·电磁波';const EXP_SEC='§4-6';const STORE_KEY='phy26_report_'+EXP_SEC.replace(/[§\/]/g,'');
  function loadSaved(){const d=JSON.parse(localStorage.getItem(STORE_KEY)||'{}');if(d.name)document.getElementById('rName').value=d.name;if(d.stuId)document.getElementById('rStuId').value=d.stuId;if(d.date)document.getElementById('rDate').value=d.date;if(d.partner)document.getElementById('rPartner').value=d.partner;if(d.purpose)document.getElementById('rPurpose').value=d.purpose;if(d.process)document.getElementById('rProcess').value=d.process;if(d.data)document.getElementById('rData').value=d.data;if(d.analysis)document.getElementById('rAnalysis').value=d.analysis;if(d.error)document.getElementById('rError').value=d.error;if(d.conclusion)document.getElementById('rConclusion').value=d.conclusion;}
  function saveDraft(){const d={name:document.getElementById('rName').value,stuId:document.getElementById('rStuId').value,date:document.getElementById('rDate').value,partner:document.getElementById('rPartner').value,purpose:document.getElementById('rPurpose').value,process:document.getElementById('rProcess').value,data:document.getElementById('rData').value,analysis:document.getElementById('rAnalysis').value,error:document.getElementById('rError').value,conclusion:document.getElementById('rConclusion').value};localStorage.setItem(STORE_KEY,JSON.stringify(d));}
  window.openReport=function(){document.getElementById('reportOverlay').classList.add('open');document.getElementById('reportOutput').classList.remove('show');document.getElementById('rmCopyBtn').style.display='none';const dateEl=document.getElementById('rDate');if(!dateEl.value)dateEl.value=new Date().toISOString().slice(0,10);loadSaved();const _d={rPurpose:'理解麦克斯韦方程组的物理意义，观察电磁波的产生和传播规律，验证电磁波的横波性质，理解E和H的相互激发机制，计算电磁波的传播速度c=1/√(ε₀μ₀)。',rProcess:'观察平面电磁波的E场和H场分布，验证E⊥H⊥传播方向（横波）；改变频率，观察波长λ=c/f的变化；观察坡印廷矢量S=E×H的方向（能量传播方向）；分析麦克斯韦方程组的四个方程在电磁波传播中的作用。',rData:'电磁波（f=3GHz）：λ=c/f=0.1m；E场和H场相位相同，振幅比E/H=√(μ₀/ε₀)=377Ω（真空波阻抗）；坡印廷矢量S=E×H，方向沿传播方向，大小S=EH=E²/377W/m²；f=1GHz时：λ=0.3m；f=10GHz时：λ=0.03m（λ∝1/f）。',rAnalysis:'麦克斯韦方程组预言了电磁波的存在：变化的电场产生磁场（∮H·dl=I_D），变化的磁场产生电场（∮E·dl=−dΦ_B/dt），两者相互激发形成电磁波。电磁波在真空中的传播速度c=1/√(ε₀μ₀)=3×10⁸m/s，与光速相同，证明光是电磁波。电磁波是横波，E和H相互垂直且都垂直于传播方向。',rError:'仿真中使用理想平面波模型，忽略了衍射、散射和吸收效应；实际电磁波在介质中传播时速度减小（v=c/n）；近场区域不满足平面波假设。',rConclusion:'麦克斯韦方程组统一了电场和磁场，预言了电磁波的存在；电磁波是横波，E⊥H⊥传播方向；真空中传播速度c=3×10⁸m/s；坡印廷矢量S=E×H描述电磁能量的传播方向和强度；光是电磁波，麦克斯韦方程组是经典电磁学的完整理论体系。'};Object.entries(_d).forEach(([id,val])=>{const el=document.getElementById(id);if(el&&!el.value)el.value=val;});};
  window.closeReport=function(){saveDraft();document.getElementById('reportOverlay').classList.remove('open');};
  window.overlayClick=function(e){if(e.target===document.getElementById('reportOverlay'))closeReport();};
  window.generateReport=function(){const name=document.getElementById('rName').value.trim();const stuId=document.getElementById('rStuId').value.trim();const date=document.getElementById('rDate').value||'—';const partner=document.getElementById('rPartner').value.trim()||'—';const purpose=document.getElementById('rPurpose').value.trim()||'（未填写）';const process=document.getElementById('rProcess').value.trim()||'（未填写）';const data=document.getElementById('rData').value.trim()||'（未填写）';const analysis=document.getElementById('rAnalysis').value.trim()||'（未填写）';const error=document.getElementById('rError').value.trim()||'（未填写）';const conclusion=document.getElementById('rConclusion').value.trim()||'（未填写）';if(!name||!stuId){alert('请填写姓名和学号');return;}saveDraft();const divider='─'.repeat(40);const report=['普通物理（卓越班）下册 · 电磁学',`实验报告：${EXP_NAME}（${EXP_SEC}）`,divider,`姓　　名：${name}　　　学　　号：${stuId}`,`实验日期：${date}　　　实验伙伴：${partner}`,divider,'','一、实验目的',purpose,'','二、实验步骤与观察',process,'','三、实验数据记录',data,'','四、结果分析',analysis,'','五、误差分析与思考',error,'','六、实验结论',conclusion,'',divider,`生成时间：${new Date().toLocaleString('zh-CN')}`,'本报告由 NUSEP26 普通物理（卓越班）实验仿真平台生成'].join('\n');const out=document.getElementById('reportOutput');out.textContent=report;out.classList.add('show');document.getElementById('rmCopyBtn').style.display='inline-flex';out.scrollIntoView({behavior:'smooth',block:'nearest'});};
  window.copyReport=function(){const text=document.getElementById('reportOutput').textContent;navigator.clipboard.writeText(text).then(()=>{const btn=document.getElementById('rmCopyBtn');const orig=btn.textContent;btn.textContent='✓ 已复制';setTimeout(()=>btn.textContent=orig,2000);}).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);const btn=document.getElementById('rmCopyBtn');btn.textContent='✓ 已复制';setTimeout(()=>btn.textContent='复制报告',2000);});};
  ['rName','rStuId','rDate','rPartner','rPurpose','rProcess','rData','rAnalysis','rError','rConclusion'].forEach(id=>document.getElementById(id).addEventListener('input',saveDraft));
})();
</script>
