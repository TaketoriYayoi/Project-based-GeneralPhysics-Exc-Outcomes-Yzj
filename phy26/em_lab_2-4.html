<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff;overflow-x:hidden}
    .topbar{display:flex;align-items:center;gap:14px;padding:16px 28px;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(15,12,41,0.7);backdrop-filter:blur(12px)}
    .back-btn{color:rgba(255,255,255,0.55);font-size:14px;cursor:pointer;text-decoration:none;transition:color .2s}
    .back-btn:hover{color:#f59e0b}
    .topbar-title-wrap{display:flex;flex-direction:column;gap:2px}.topbar-title{font-size:16px;font-weight:700}.topbar-course{font-size:11px;color:rgba(255,255,255,0.38);letter-spacing:1px}
    .topbar-sub{margin-left:auto;font-size:12px;color:rgba(255,255,255,0.3)}
    .layout{display:flex;height:calc(100vh - 57px)}
    .sidebar{width:240px;flex-shrink:0;background:rgba(255,255,255,0.03);border-right:1px solid rgba(255,255,255,0.07);padding:20px 16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
    .ctrl-group h3{font-size:11px;color:rgba(255,255,255,0.38);letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
    .divider{height:1px;background:rgba(255,255,255,0.07)}
    .tab-btns{display:flex;gap:5px;margin-bottom:4px}

    .tab-btn.active{background:rgba(245,158,11,0.18);border-color:rgba(245,158,11,0.5);color:#f59e0b}
    .charge-btns{display:flex;gap:7px}
    .charge-btn{flex:1;padding:7px 0;border-radius:9px;border:1.5px solid;font-size:18px;cursor:pointer;text-align:center;transition:all .18s;background:transparent}
    .charge-btn.pos{border-color:rgba(239,68,68,0.4);color:#f87171}
    .charge-btn.pos.active{background:rgba(239,68,68,0.18);border-color:#f87171}
    .charge-btn.neg{border-color:rgba(56,189,248,0.4);color:#38bdf8}
    .charge-btn.neg.active{background:rgba(56,189,248,0.18);border-color:#38bdf8}
    .charge-btn.erase{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);font-size:13px}
    .charge-btn.erase.active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4)}
    .slider-row{display:flex;flex-direction:column;gap:4px;margin-bottom:6px}
    .slider-row label{font-size:12.5px;color:rgba(255,255,255,0.6);display:flex;justify-content:space-between}
    .slider-row label span{color:#f59e0b;font-weight:600}
    input[type=range]{width:100%;accent-color:#f59e0b}
    .toggle-row{display:flex;align-items:center;justify-content:space-between}
    .toggle-row span{font-size:13px;color:rgba(255,255,255,0.6)}
    .toggle{width:38px;height:20px;border-radius:10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);cursor:pointer;position:relative;transition:background .2s}
    .toggle.on{background:rgba(245,158,11,0.5);border-color:#f59e0b}
    .toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.6);transition:left .2s}
    .toggle.on::after{left:20px;background:#fff}
    .result-panel{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.2);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:7px}
    .result-panel h3{font-size:11px;color:rgba(245,158,11,0.7);letter-spacing:1px}
    .result-row{display:flex;justify-content:space-between;align-items:baseline}
    .result-label{font-size:12px;color:rgba(255,255,255,0.45)}
    .result-value{font-size:13px;font-weight:700;color:#f59e0b}
    .result-unit{font-size:11px;color:rgba(255,255,255,0.3);margin-left:2px}
    .clear-btn{padding:7px;border-radius:9px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-size:12px;cursor:pointer;text-align:center;transition:all .18s;font-family:"Microsoft YaHei",sans-serif}
    .clear-btn:hover{background:rgba(239,68,68,0.15);color:#f87171;border-color:rgba(239,68,68,0.3)}
    .canvas-wrap{flex:1;position:relative;overflow:hidden;background:rgba(0,0,0,0.25)}
    #energyCanvas{display:block;width:100%;height:100%;cursor:crosshair}
    .formula-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(15,12,41,0.88);border:1px solid rgba(245,158,11,0.25);border-radius:10px;padding:9px 18px;font-size:12px;color:rgba(255,255,255,0.5);white-space:nowrap}
    .probe-tip{position:absolute;pointer-events:none;display:none;background:rgba(10,8,30,0.9);border:1px solid rgba(245,158,11,0.4);border-radius:8px;padding:8px 12px;font-size:11.5px;color:#fcd34d;line-height:1.8;white-space:nowrap}
  </style>

<body>
<div class="topbar">
  <a class="back-btn" href="em.html">← 电磁学</a>
  <div class="topbar-title">⚡ 实验：静电场能量</div>
  <div class="topbar-sub">§2-4 电场能量密度</div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="ctrl-group">
      <h3>模式</h3>
      <div class="tab-btns">
        <div class="tab-btn active" id="tab1btn" onclick="setTab(1)">能量密度</div>
        <div class="tab-btn" id="tab2btn" onclick="setTab(2)">电容器</div>
        <div class="tab-btn" id="tab3btn" onclick="setTab(3)">点电荷系</div>
      </div>
    </div>

    <!-- Tab 1 controls -->
    <div id="ctrl1">
      <div class="charge-btns">
        <div class="charge-btn pos active" id="btnPos" onclick="setMode('pos')">＋</div>
        <div class="charge-btn neg" id="btnNeg" onclick="setMode('neg')">－</div>
        <div class="charge-btn erase" id="btnErase" onclick="setMode('erase')">✕</div>
      </div>
      <div class="slider-row" style="margin-top:8px">
        <label>电荷量 <span id="qVal">1</span> q</label>
        <input type="range" id="qSlider" min="0.5" max="3" step="0.5" value="1" oninput="document.getElementById('qVal').textContent=this.value;redraw()">
      </div>
      <div class="toggle-row">
        <span>显示等势线</span>
        <div class="toggle" id="togEq" onclick="togOpt('Eq')"></div>
      </div>
      <div class="toggle-row" style="margin-top:6px">
        <span>显示电场线</span>
        <div class="toggle on" id="togFL" onclick="togOpt('FL')"></div>
      </div>
    </div>

    <!-- Tab 2 controls -->
    <div id="ctrl2" style="display:none">
      <div class="slider-row">
        <label>电压 V = <span id="vVal2">100</span> V</label>
        <input type="range" id="vSlider2" min="10" max="300" step="10" value="100" oninput="updateCap()">
      </div>
      <div class="slider-row">
        <label>面积 S = <span id="sVal2">0.10</span> m²</label>
        <input type="range" id="sSlider2" min="1" max="20" step="1" value="10" oninput="updateCap()">
      </div>
      <div class="slider-row">
        <label>间距 d = <span id="dVal2">5</span> mm</label>
        <input type="range" id="dSlider2" min="1" max="20" step="1" value="5" oninput="updateCap()">
      </div>
      <div class="slider-row">
        <label>εᵣ = <span id="erVal2">1.0</span></label>
        <input type="range" id="erSlider2" min="1" max="10" step="0.5" value="1" oninput="updateCap()">
      </div>
    </div>

    <!-- Tab 3 controls -->
    <div id="ctrl3" style="display:none">
      <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;line-height:1.6">拖动电荷改变位置<br>连线颜色：蓝=吸引，橙=排斥</div>
      <div class="slider-row">
        <label>电荷量 <span id="qVal3">2</span> μC</label>
        <input type="range" id="qSlider3" min="0.5" max="5" step="0.5" value="2" oninput="document.getElementById('qVal3').textContent=this.value;redrawPCS()">
      </div>
    </div>

    <div class="divider"></div>
    <div class="result-panel">
      <h3>能量结果</h3>
      <div class="result-row"><span class="result-label">能量密度 wₑ</span><span><span class="result-value" id="resWe">—</span><span class="result-unit">（相对）</span></span></div>
      <div class="result-row"><span class="result-label">总场能 Wₑ</span><span><span class="result-value" id="resWtot">—</span><span class="result-unit">（相对）</span></span></div>
      <div class="result-row" id="capRow" style="display:none"><span class="result-label">½CV²</span><span><span class="result-value" id="resCV">—</span><span class="result-unit">μJ</span></span></div>
    </div>
    <div class="clear-btn" onclick="clearCharges()">清除电荷</div>
    <div class="report-fab" style="margin-top:auto;padding-top:12px">
      <button class="report-fab-btn" onclick="openReport()">
        <span class="rfb-icon">📄</span> 生成实验报告
      </button>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="energyCanvas"></canvas>
    <div class="formula-bar" id="fbar">wₑ = ½ε₀E²  |  Wₑ = ∫wₑ dV  |  W = ½CV²</div>
    <div class="probe-tip" id="probeTip"></div>
  </div>
</div>

<script>
const canvas=document.getElementById('energyCanvas');
const ctx=canvas.getContext('2d');
const eps0=8.854e-12;
const k=9e9;

let activeTab=1;
let mode='pos';
let charges=[];
let showEq=false, showFL=true;
let dragging=null, dragOffX=0, dragOffY=0;
let mouseX=0, mouseY=0;

// Point charge system tab charges (fixed layout)
const pcsCharges=[
  {x:0,y:0,q:1,sign:1},
  {x:0,y:0,q:1,sign:-1},
  {x:0,y:0,q:1,sign:1}
];
let pcsInit=false;
let pcsDragging=null, pcsDragOx=0, pcsDragOy=0;

function setTab(t){
  activeTab=t;
  [1,2,3].forEach(i=>{
    document.getElementById('tab'+i+'btn').classList.toggle('active',i===t);
    document.getElementById('ctrl'+i).style.display=i===t?'flex':'none';
    if(i===2||i===3) document.getElementById('ctrl'+i).style.flexDirection='column';
  });
  document.getElementById('capRow').style.display=t===2?'flex':'none';
  if(t===2) updateCap();
  else if(t===3){if(!pcsInit)initPCS();redrawPCS();}
  else redraw();
}

function setMode(m){
  mode=m;
  document.getElementById('btnPos').classList.toggle('active',m==='pos');
  document.getElementById('btnNeg').classList.toggle('active',m==='neg');
  document.getElementById('btnErase').classList.toggle('active',m==='erase');
}
function togOpt(n){
  if(n==='Eq')showEq=!showEq;
  else showFL=!showFL;
  document.getElementById('tog'+n).classList.toggle('on',eval('show'+n));
  redraw();
}
function clearCharges(){charges=[];redraw();}

function resize(){
  canvas.width=canvas.parentElement.clientWidth;
  canvas.height=canvas.parentElement.clientHeight;
  if(!pcsInit&&activeTab===3) initPCS();
  else if(activeTab===3) repositionPCS();
  if(activeTab===1)redraw();
  else if(activeTab===2)updateCap();
  else redrawPCS();
}
window.addEventListener('resize',resize);

// ── Field functions ──
function field(x,y){
  let ex=0,ey=0;
  for(const c of charges){
    const dx=x-c.x,dy=y-c.y,r2=dx*dx+dy*dy;
    if(r2<1)continue;
    const r=Math.sqrt(r2),k2=c.q/(r2*r);
    ex+=k2*dx;ey+=k2*dy;
  }
  return[ex,ey];
}
function potential(x,y){
  let v=0;
  for(const c of charges){const r=Math.sqrt((x-c.x)**2+(y-c.y)**2);if(r<1)continue;v+=c.q/r;}
  return v;
}

// ── Tab 1: Energy density map ──
function drawEnergyMap(){
  if(!charges.length)return;
  const W=canvas.width,H=canvas.height,step=8;
  const cols=Math.ceil(W/step),rows=Math.ceil(H/step);
  let maxWe=0;
  const we=[];
  for(let r=0;r<rows;r++){we[r]=[];for(let c=0;c<cols;c++){const[ex,ey]=field(c*step,r*step);const em2=ex*ex+ey*ey;we[r][c]=em2;maxWe=Math.max(maxWe,em2);}}
  if(maxWe===0)return;
  let totalWe=0;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const t=Math.min(we[r][c]/maxWe,1);
    totalWe+=t;
    // color: dark blue → orange → yellow (energy density)
    const R=Math.round(t*255),G=Math.round(t*180*Math.max(0,1-t*1.5)),B=Math.round((1-t)*180);
    ctx.fillStyle=`rgba(${R},${G},${B},${0.1+t*0.5})`;
    ctx.fillRect(c*step,r*step,step,step);
  }
  // peak value at mouse
  const[ex,ey]=field(mouseX,mouseY);
  const em=Math.sqrt(ex*ex+ey*ey);
  const we_mouse=em*em;
  document.getElementById('resWe').textContent=(we_mouse/maxWe).toFixed(4);
  document.getElementById('resWtot').textContent=(totalWe/1000).toFixed(3);
}

function drawEquipotentials(){
  const W=canvas.width,H=canvas.height,step=24;
  const cols=Math.floor(W/step)+1,rows=Math.floor(H/step)+1;
  const grid=[];let vmin=Infinity,vmax=-Infinity;
  for(let r=0;r<rows;r++){grid[r]=[];for(let c=0;c<cols;c++){const v=potential(c*step,r*step);grid[r][c]=v;if(isFinite(v)&&Math.abs(v)<1e6){vmin=Math.min(vmin,v);vmax=Math.max(vmax,v);}}}
  if(!isFinite(vmin))return;
  ctx.save();ctx.strokeStyle='rgba(200,160,255,0.45)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  for(let l=1;l<14;l++){
    const iso=vmin+(vmax-vmin)*l/14;
    for(let r=0;r<rows-1;r++) for(let c=0;c<cols-1;c++){
      const v00=grid[r][c],v10=grid[r][c+1],v01=grid[r+1][c],v11=grid[r+1][c+1];
      const x0=c*step,y0=r*step,pts=[];
      if((v00-iso)*(v10-iso)<0){const t=(iso-v00)/(v10-v00);pts.push([x0+t*step,y0]);}
      if((v10-iso)*(v11-iso)<0){const t=(iso-v10)/(v11-v10);pts.push([x0+step,y0+t*step]);}
      if((v01-iso)*(v11-iso)<0){const t=(iso-v01)/(v11-v01);pts.push([x0+t*step,y0+step]);}
      if((v00-iso)*(v01-iso)<0){const t=(iso-v00)/(v01-v00);pts.push([x0,y0+t*step]);}
      if(pts.length>=2){ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);ctx.lineTo(pts[1][0],pts[1][1]);ctx.stroke();}
    }
  }
  ctx.restore();
}

function traceFL(sx,sy,sign){
  const step=4,maxS=1500;
  ctx.beginPath();ctx.moveTo(sx,sy);
  let x=sx,y=sy,d=0;
  for(let i=0;i<maxS;i++){
    let[ex,ey]=field(x,y);const em=Math.sqrt(ex*ex+ey*ey);if(em<1e-10)break;
    ex/=em;ey/=em;
    const nx=x+sign*step*ex,ny=y+sign*step*ey;
    let hit=false;
    for(const c of charges){if(c.q*sign<0&&(nx-c.x)**2+(ny-c.y)**2<100){hit=true;break;}}
    if(hit){ctx.lineTo(nx,ny);break;}
    if(nx<0||nx>canvas.width||ny<0||ny>canvas.height)break;
    ctx.lineTo(nx,ny);
    d+=step;if(d>=50){d=0;const ang=Math.atan2(sign*ey,sign*ex),as=6;ctx.save();ctx.translate(nx,ny);ctx.rotate(ang);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-as,-as*0.4);ctx.lineTo(-as,as*0.4);ctx.closePath();ctx.fillStyle=ctx.strokeStyle;ctx.fill();ctx.restore();ctx.beginPath();ctx.moveTo(nx,ny);}
    x=nx;y=ny;
  }
  ctx.stroke();
}

function redraw(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(!charges.length){
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='14px "Microsoft YaHei"';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('点击画布放置电荷，观察电场能量密度分布',W/2,H/2);
    document.getElementById('resWe').textContent='—';
    document.getElementById('resWtot').textContent='—';
    return;
  }
  drawEnergyMap();
  if(showEq)drawEquipotentials();
  if(showFL){
    charges.forEach(c=>{
      const n=12*Math.abs(c.q);
      for(let i=0;i<n;i++){const a=2*Math.PI*i/n;ctx.strokeStyle='rgba(255,210,60,0.55)';ctx.lineWidth=1.1;traceFL(c.x+14*Math.cos(a),c.y+14*Math.sin(a),c.q>0?1:-1);}
    });
  }
  // draw charges
  charges.forEach(c=>{
    const r=12+4*(Math.abs(c.q)-0.5),col=c.q>0?'#f87171':'#38bdf8';
    ctx.beginPath();ctx.arc(c.x,c.y,r,0,Math.PI*2);ctx.fillStyle=col+'33';ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 15px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c.q>0?'＋':'－',c.x,c.y+1);
  });
}

// ── Tab 2: Capacitor energy ──
function updateCap(){
  const V=parseInt(document.getElementById('vSlider2').value);
  const S=parseInt(document.getElementById('sSlider2').value)*0.01;
  const d=parseInt(document.getElementById('dSlider2').value)*1e-3;
  const er=parseFloat(document.getElementById('erSlider2').value);
  document.getElementById('vVal2').textContent=V;
  document.getElementById('sVal2').textContent=S.toFixed(2);
  document.getElementById('dVal2').textContent=(d*1000).toFixed(0);
  document.getElementById('erVal2').textContent=er.toFixed(1);
  const C=eps0*er*S/d;
  const E=V/d;
  const We=0.5*C*V*V;
  const we=0.5*eps0*er*E*E;
  document.getElementById('resWe').textContent=(we).toFixed(2);
  document.getElementById('resWtot').textContent=(We*1e6).toFixed(3);
  document.getElementById('resCV').textContent=(We*1e6).toFixed(3);
  drawCap(V,C,E,We,we,er,S,d);
}

function drawCap(V,C,E,We,we,er,S,d){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const px=80,py=80,pw=W-160,ph=H-180;
  const dSlVal=parseInt(document.getElementById('dSlider2').value);
  const gapPx=20+(dSlVal-1)/19*100;
  const topY=py+(ph-gapPx)/2-18, botY=topY+18+gapPx;

  // energy density color fill
  const Enormed=Math.min(E/200000,1);
  const r=Math.round(Enormed*255),g=Math.round(Enormed*180*0.6),b=0;
  for(let yi=topY+18;yi<botY;yi+=4){
    const t=Math.min((yi-(topY+18))/gapPx+0.5,1);
    ctx.fillStyle=`rgba(${r},${g},${b},${0.05+Enormed*0.35})`;
    ctx.fillRect(px,yi,pw,4);
  }

  // plates
  const g1=ctx.createLinearGradient(0,topY,0,topY+18);g1.addColorStop(0,'rgba(239,68,68,0.6)');g1.addColorStop(1,'rgba(180,40,40,0.4)');
  ctx.fillStyle=g1;ctx.beginPath();ctx.roundRect(px,topY,pw,18,3);ctx.fill();
  ctx.strokeStyle='rgba(239,68,68,0.7)';ctx.lineWidth=1.5;ctx.stroke();
  const g2=ctx.createLinearGradient(0,botY,0,botY+18);g2.addColorStop(0,'rgba(30,80,200,0.4)');g2.addColorStop(1,'rgba(56,189,248,0.6)');
  ctx.fillStyle=g2;ctx.beginPath();ctx.roundRect(px,botY,pw,18,3);ctx.fill();
  ctx.strokeStyle='rgba(56,189,248,0.7)';ctx.lineWidth=1.5;ctx.stroke();

  // energy arrows (downward inside gap)
  const nArr=7;
  for(let i=1;i<=nArr;i++){
    const ax=px+i*pw/(nArr+1), ay=(topY+18+botY)/2;
    ctx.strokeStyle=`rgba(245,158,11,${0.4+Enormed*0.5})`;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(ax,topY+22);ctx.lineTo(ax,botY-4);ctx.stroke();
    ctx.fillStyle=`rgba(245,158,11,${0.4+Enormed*0.5})`;
    ctx.beginPath();ctx.moveTo(ax,botY-4);ctx.lineTo(ax-5,botY-12);ctx.lineTo(ax+5,botY-12);ctx.closePath();ctx.fill();
  }

  // labels
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='12px "Microsoft YaHei"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(`εᵣ = ${er}`,W/2,topY+22+(gapPx-16)/2);
  ctx.fillStyle='rgba(245,158,11,0.8)';ctx.font='bold 13px "Microsoft YaHei"';
  ctx.fillText(`E = ${(E/1000).toFixed(1)} kV/m`,W/2,topY+22+(gapPx+16)/2);

  // energy bar (right side)
  const barX=W-60,barMaxH=ph,barH=Math.min(We*1e6/500*barMaxH,barMaxH);
  ctx.fillStyle='rgba(245,158,11,0.1)';ctx.fillRect(barX,py,30,barMaxH);
  ctx.fillStyle='rgba(245,158,11,0.6)';ctx.fillRect(barX,py+barMaxH-barH,30,barH);
  ctx.strokeStyle='rgba(245,158,11,0.3)';ctx.lineWidth=1;ctx.strokeRect(barX,py,30,barMaxH);
  ctx.fillStyle='rgba(245,158,11,0.7)';ctx.font='11px "Microsoft YaHei"';ctx.textAlign='center';
  ctx.fillText(`Wₑ`,barX+15,py+barMaxH+14);
  ctx.fillText(`${(We*1e6).toFixed(2)}μJ`,barX+15,py+barMaxH+28);

  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='13px "Microsoft YaHei"';ctx.textAlign='center';
  ctx.fillText(`C = ε₀·${er}·S/d = ${(C*1e12).toFixed(2)} pF  |  W = ½CV² = ${(We*1e6).toFixed(3)} μJ`,W/2,H-20);
}

// ── Tab 3: Point charge system energy ──
function initPCS(){
  const W=canvas.width,H=canvas.height;
  pcsCharges[0]={x:W/2-120,y:H/2,q:1,sign:1};
  pcsCharges[1]={x:W/2+120,y:H/2,q:-1,sign:-1};
  pcsCharges[2]={x:W/2,y:H/2-100,q:1,sign:1};
  pcsInit=true;
}
function repositionPCS(){
  const W=canvas.width,H=canvas.height;
  const cx=W/2,cy=H/2;
  pcsCharges[0].x=cx-120;pcsCharges[0].y=cy;
  pcsCharges[1].x=cx+120;pcsCharges[1].y=cy;
  pcsCharges[2].x=cx;pcsCharges[2].y=cy-100;
}

function redrawPCS(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const qMag=parseFloat(document.getElementById('qSlider3').value)*1e-6;
  for(let i=0;i<3;i++) pcsCharges[i].q=pcsCharges[i].sign*qMag;

  // compute pair energies
  let Wtot=0;
  const pairs=[];
  for(let i=0;i<3;i++) for(let j=i+1;j<3;j++){
    const dx=pcsCharges[i].x-pcsCharges[j].x,dy=pcsCharges[i].y-pcsCharges[j].y;
    const rPx=Math.sqrt(dx*dx+dy*dy);
    const rM=rPx/1000;
    const Wij=k*pcsCharges[i].q*pcsCharges[j].q/rM;
    pairs.push({i,j,Wij,rPx});
    Wtot+=Wij;
  }

  // draw interaction lines
  pairs.forEach(({i,j,Wij})=>{
    const ci=pcsCharges[i],cj=pcsCharges[j];
    const attract=Wij<0;
    const t=Math.min(Math.abs(Wij)/1e-3,1);
    const col=attract?`rgba(56,189,248,${0.3+t*0.5})`:`rgba(251,146,60,${0.3+t*0.5})`;
    ctx.strokeStyle=col;ctx.lineWidth=2+t*2;
    ctx.beginPath();ctx.moveTo(ci.x,ci.y);ctx.lineTo(cj.x,cj.y);ctx.stroke();
    const mx=(ci.x+cj.x)/2,my=(ci.y+cj.y)/2;
    ctx.fillStyle=col;ctx.font='11px "Microsoft YaHei"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(`${Wij>0?'+':''}${(Wij*1e6).toFixed(2)} μJ`,mx,my-10);
  });

  // draw charges
  pcsCharges.forEach((c,i)=>{
    const col=c.sign>0?'#f87171':'#38bdf8';
    ctx.beginPath();ctx.arc(c.x,c.y,18,0,Math.PI*2);
    ctx.fillStyle=col+'33';ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c.sign>0?'＋':'－',c.x,c.y+1);
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='11px "Microsoft YaHei"';ctx.textBaseline='top';
    ctx.fillText(`q${i+1}=${c.sign>0?'+':''}${(c.q*1e6).toFixed(1)}μC`,c.x,c.y+22);
  });

  document.getElementById('resWtot').textContent=(Wtot*1e6).toFixed(3);
  document.getElementById('resWe').textContent=Wtot>0?'正（排斥）':'负（吸引）';

  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='13px "Microsoft YaHei"';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(`W_总 = Σ k·qi·qj/rij = ${(Wtot*1e6).toFixed(3)} μJ`,W/2,16);
}

// ── Interaction ──
function getPos(e){
  const rect=canvas.getBoundingClientRect();
  return[(e.clientX-rect.left)*canvas.width/rect.width,(e.clientY-rect.top)*canvas.height/rect.height];
}
function nearCharge(arr,x,y,r=25){
  for(let i=arr.length-1;i>=0;i--){if((x-arr[i].x)**2+(y-arr[i].y)**2<r*r)return i;}return -1;
}

canvas.addEventListener('mousedown',e=>{
  const[x,y]=getPos(e);
  if(activeTab===1){
    const idx=nearCharge(charges,x,y);
    if(mode==='erase'){if(idx>=0){charges.splice(idx,1);redraw();}return;}
    if(idx>=0){dragging=idx;dragOffX=x-charges[idx].x;dragOffY=y-charges[idx].y;}
    else{const q=parseFloat(document.getElementById('qSlider').value)*(mode==='neg'?-1:1);charges.push({x,y,q});redraw();}
  } else if(activeTab===3){
    const idx=nearCharge(pcsCharges,x,y);
    if(idx>=0){pcsDragging=idx;pcsDragOx=x-pcsCharges[idx].x;pcsDragOy=y-pcsCharges[idx].y;}
  }
});

canvas.addEventListener('mousemove',e=>{
  const[x,y]=getPos(e);mouseX=x;mouseY=y;
  if(activeTab===1){
    if(dragging!==null){charges[dragging].x=x-dragOffX;charges[dragging].y=y-dragOffY;redraw();}
    else if(charges.length>0){
      const[ex,ey]=field(x,y);const em=Math.sqrt(ex*ex+ey*ey);
      const tip=document.getElementById('probeTip');
      tip.style.display='block';
      const rect=canvas.parentElement.getBoundingClientRect();
      tip.style.left=(e.clientX-rect.left+14)+'px';tip.style.top=(e.clientY-rect.top+14)+'px';
      tip.innerHTML=`wₑ ∝ |E|² = ${(em*em).toFixed(4)}<br>V = ${potential(x,y).toFixed(3)}`;
      redraw();
    }
  } else if(activeTab===3&&pcsDragging!==null){
    pcsCharges[pcsDragging].x=x-pcsDragOx;pcsCharges[pcsDragging].y=y-pcsDragOy;
    redrawPCS();
  }
});

canvas.addEventListener('mouseup',()=>{dragging=null;pcsDragging=null;});
canvas.addEventListener('mouseleave',()=>{dragging=null;pcsDragging=null;document.getElementById('probeTip').style.display='none';});

resize();
</script>

<script>
(function(){
  const EXP_NAME = '静电场能量';
  const EXP_SEC  = '§2-4';
  const STORE_KEY = 'phy26_report_' + EXP_SEC.replace(/[§\/]/g,'');

  function loadSaved() {
    const d = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    if (d.name)       document.getElementById('rName').value      = d.name;
    if (d.stuId)      document.getElementById('rStuId').value     = d.stuId;
    if (d.date)       document.getElementById('rDate').value      = d.date;
    if (d.partner)    document.getElementById('rPartner').value   = d.partner;
    if (d.purpose)    document.getElementById('rPurpose').value   = d.purpose;
    if (d.process)    document.getElementById('rProcess').value   = d.process;
    if (d.data)       document.getElementById('rData').value      = d.data;
    if (d.analysis)   document.getElementById('rAnalysis').value  = d.analysis;
    if (d.error)      document.getElementById('rError').value     = d.error;
    if (d.conclusion) document.getElementById('rConclusion').value= d.conclusion;
  }

  function saveDraft() {
    const d = {
      name:       document.getElementById('rName').value,
      stuId:      document.getElementById('rStuId').value,
      date:       document.getElementById('rDate').value,
      partner:    document.getElementById('rPartner').value,
      purpose:    document.getElementById('rPurpose').value,
      process:    document.getElementById('rProcess').value,
      data:       document.getElementById('rData').value,
      analysis:   document.getElementById('rAnalysis').value,
      error:      document.getElementById('rError').value,
      conclusion: document.getElementById('rConclusion').value,
    };
    localStorage.setItem(STORE_KEY, JSON.stringify(d));
  }

  window.openReport = function() {
    document.getElementById('reportOverlay').classList.add('open');
    document.getElementById('reportOutput').classList.remove('show');
    document.getElementById('rmCopyBtn').style.display = 'none';
    const dateEl = document.getElementById('rDate');
    if (!dateEl.value) dateEl.value = new Date().toISOString().slice(0,10);
    loadSaved();
    const _d = {
      rPurpose:    '研究静电场的能量分布，理解电场能量密度w=ε₀E²/2的概念，计算不同电荷配置下的总静电能，验证能量叠加原理和电容器储能公式。',
      rProcess:    '设置单个点电荷，计算其自能；设置两个点电荷，计算系统总能量（自能+互能）；改变平行板电容器的参数，计算储存的电场能量；观察能量密度在空间中的分布，验证能量集中在强场区域。',
      rData:       '平行板电容器（A=0.01m²，d=1mm，V=100V）：E=10⁵V/m，能量密度w=ε₀E²/2=44.3J/m³，总能量W=w·A·d=4.43×10⁻⁷J；与W=CV²/2=88.5×10⁻¹²×10⁴/2=4.43×10⁻⁷J一致；两点电荷（q₁=q₂=1μC，r=1m）：互能U₁₂=kq₁q₂/r=8.99×10⁻³J。',
      rAnalysis:   '静电场能量储存在电场本身中，能量密度w=ε₀E²/2（真空中）。总能量W=∫(ε₀E²/2)dV。对于电容器，W=CV²/2=Q²/(2C)=QV/2，三种表达式等价。点电荷系统总能量包括各电荷的自能（发散）和电荷间的互能（有限值）。',
      rError:      '点电荷的自能在理论上发散，仿真中通过截断处理；实际电容器中介质损耗会导致能量以热的形式散失；边缘效应使实际储能略大于理论值。',
      rConclusion: '静电场能量储存在电场中，能量密度w=ε₀E²/2；电容器储能W=CV²/2，与极板电压平方成正比；强场区域能量密度大；两电荷系统总能量等于自能之和加上互能。',
    };
    Object.entries(_d).forEach(([id, val]) => { const el = document.getElementById(id); if (el && !el.value) el.value = val; });
  };

  window.closeReport = function() {
    saveDraft();
    document.getElementById('reportOverlay').classList.remove('open');
  };

  window.overlayClick = function(e) {
    if (e.target === document.getElementById('reportOverlay')) closeReport();
  };

  window.generateReport = function() {
    const name       = document.getElementById('rName').value.trim();
    const stuId      = document.getElementById('rStuId').value.trim();
    const date       = document.getElementById('rDate').value || '—';
    const partner    = document.getElementById('rPartner').value.trim() || '—';
    const purpose    = document.getElementById('rPurpose').value.trim() || '（未填写）';
    const process    = document.getElementById('rProcess').value.trim() || '（未填写）';
    const data       = document.getElementById('rData').value.trim() || '（未填写）';
    const analysis   = document.getElementById('rAnalysis').value.trim() || '（未填写）';
    const error      = document.getElementById('rError').value.trim() || '（未填写）';
    const conclusion = document.getElementById('rConclusion').value.trim() || '（未填写）';

    if (!name || !stuId) { alert('请填写姓名和学号'); return; }
    saveDraft();

    const divider = '─'.repeat(40);
    const report = [
      '普通物理（卓越班）下册 · 电磁学',
      `实验报告：${EXP_NAME}（${EXP_SEC}）`,
      divider,
      `姓　　名：${name}　　　学　　号：${stuId}`,
      `实验日期：${date}　　　实验伙伴：${partner}`,
      divider,
      '',
      '一、实验目的',
      purpose,
      '',
      '二、实验步骤与观察',
      process,
      '',
      '三、实验数据记录',
      data,
      '',
      '四、结果分析',
      analysis,
      '',
      '五、误差分析与思考',
      error,
      '',
      '六、实验结论',
      conclusion,
      '',
      divider,
      `生成时间：${new Date().toLocaleString('zh-CN')}`,
      '本报告由 NUSEP26 普通物理（卓越班）实验仿真平台生成',
    ].join('\n');

    const out = document.getElementById('reportOutput');
    out.textContent = report;
    out.classList.add('show');
    document.getElementById('rmCopyBtn').style.display = 'inline-flex';
    out.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  window.copyReport = function() {
    const text = document.getElementById('reportOutput').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('rmCopyBtn');
      const orig = btn.textContent;
      btn.textContent = '✓ 已复制';
      setTimeout(() => btn.textContent = orig, 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      const btn = document.getElementById('rmCopyBtn');
      btn.textContent = '✓ 已复制';
      setTimeout(() => btn.textContent = '复制报告', 2000);
    });
  };

  ['rName','rStuId','rDate','rPartner','rPurpose','rProcess','rData','rAnalysis','rError','rConclusion']
    .forEach(id => document.getElementById(id).addEventListener('input', saveDraft));
})();
</script>
