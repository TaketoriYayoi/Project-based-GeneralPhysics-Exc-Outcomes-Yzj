<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>实验：电场线模拟 — 1-2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh; color: #fff; overflow-x: hidden;
    }
    .topbar {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(15,12,41,0.7);
      backdrop-filter: blur(12px);
    }
    .back-btn { color: rgba(255,255,255,0.55); font-size: 14px; cursor: pointer; text-decoration: none; transition: color .2s; }
    .back-btn:hover { color: #818cf8; }
    .topbar-title-wrap { display:flex; flex-direction:column; gap:2px; }
    .topbar-title { font-size: 16px; font-weight: 700; color: #fff; }
    .topbar-course { font-size:11px; color:rgba(255,255,255,0.38); letter-spacing:1px; }
    .topbar-sub { margin-left: auto; font-size: 12px; color: rgba(255,255,255,0.3); }

    .layout {
      display: flex; gap: 0;
      height: calc(100vh - 57px);
    }

    /* ── 侧栏 ── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: rgba(255,255,255,0.03);
      border-right: 1px solid rgba(255,255,255,0.07);
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
      overflow-y: auto;
    }
    .sidebar h3 { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 1px; margin-bottom: 4px; }
    .charge-btns { display: flex; gap: 8px; }
    .charge-btn {
      flex: 1; padding: 8px 0; border-radius: 10px; border: 1.5px solid;
      font-size: 20px; cursor: pointer; text-align: center;
      transition: all .18s; background: transparent;
    }
    .charge-btn.pos { border-color: rgba(239,68,68,0.4); color: #f87171; }
    .charge-btn.pos:hover, .charge-btn.pos.active { background: rgba(239,68,68,0.18); border-color: #f87171; }
    .charge-btn.neg { border-color: rgba(56,189,248,0.4); color: #38bdf8; }
    .charge-btn.neg:hover, .charge-btn.neg.active { background: rgba(56,189,248,0.18); border-color: #38bdf8; }
    .charge-btn.erase { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); font-size: 14px; padding: 8px 0; }
    .charge-btn.erase:hover, .charge-btn.erase.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); color: #fff; }

    .mode-hint {
      font-size: 12px; color: rgba(255,255,255,0.35); line-height: 1.6;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; padding: 10px 12px;
    }

    .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 4px 0; }

    .slider-row { display: flex; flex-direction: column; gap: 6px; }
    .slider-row label { font-size: 12px; color: rgba(255,255,255,0.45); display: flex; justify-content: space-between; }
    input[type=range] { width: 100%; accent-color: #818cf8; }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-row span { font-size: 13px; color: rgba(255,255,255,0.6); }
    .toggle {
      width: 38px; height: 20px; border-radius: 10px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer; position: relative; transition: background .2s;
    }
    .toggle.on { background: rgba(99,102,241,0.5); border-color: #818cf8; }
    .toggle::after {
      content:''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(255,255,255,0.6); transition: left .2s;
    }
    .toggle.on::after { left: 20px; background: #fff; }

    .clear-btn {
      padding: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5);
      font-size: 13px; cursor: pointer; text-align: center;
      transition: all .18s; font-family: "Microsoft YaHei", sans-serif;
    }
    .clear-btn:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.3); }

    .legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.45); }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    /* ── 画布区 ── */
    .canvas-wrap {
      flex: 1; position: relative; overflow: hidden;
      background: rgba(0,0,0,0.25);
    }
    #simCanvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

    .tip {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: rgba(255,255,255,0.25);
      pointer-events: none; white-space: nowrap;
    }

    /* ── 探针浮窗 ── */
    .probe-tip {
      position: absolute; pointer-events: none; display: none;
      background: rgba(10,8,30,0.92); border: 1px solid rgba(129,140,248,0.4);
      border-radius: 8px; padding: 8px 12px; font-size: 11.5px;
      color: #c4b5fd; line-height: 1.8; white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    /* ── 测量工具按钮 ── */
    .tool-btns { display: flex; gap: 6px; }
    .tool-btn {
      flex:1; padding:6px 4px; border-radius:8px; border:1px solid rgba(255,255,255,0.1);
      font-size:11px; cursor:pointer; text-align:center;
      color:rgba(255,255,255,0.4); transition:all .18s; background:transparent;
      font-family:"Microsoft YaHei",sans-serif;
    }
    .tool-btn.active { background:rgba(99,102,241,0.18); border-color:rgba(99,102,241,0.5); color:#818cf8; }
    .tool-btn:hover:not(.active) { background:rgba(255,255,255,0.06); }

    /* ── 探针读数面板 ── */
    .probe-panel {
      background:rgba(99,102,241,0.06); border:1px solid rgba(99,102,241,0.18);
      border-radius:10px; padding:10px 12px; display:flex; flex-direction:column; gap:6px;
    }
    .probe-panel h4 { font-size:10px; color:rgba(99,102,241,0.6); letter-spacing:1px; }
    .probe-line { display:flex; justify-content:space-between; font-size:11.5px; }
    .probe-line span:first-child { color:rgba(255,255,255,0.4); }
    .probe-line span:last-child { color:#818cf8; font-weight:600; }
  </style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="em.html">← 电磁学</a>
  <div class="topbar-title-wrap">
    <div class="topbar-title">⚡ 实验：电场线模拟</div>
    <span class="topbar-course">普通物理（卓越班）下册 · 电磁学</span>
  </div>
  <div class="topbar-sub">§1-2 电场强度</div>
</div>

<div class="layout">
  <div class="sidebar">
    <div>
      <h3>放置电荷</h3>
      <div class="charge-btns" style="margin-top:8px;">
        <div class="charge-btn pos active" id="btnPos" onclick="setMode('pos')" title="正电荷">＋</div>
        <div class="charge-btn neg" id="btnNeg" onclick="setMode('neg')" title="负电荷">－</div>
        <div class="charge-btn erase" id="btnErase" onclick="setMode('erase')" title="擦除">✕</div>
      </div>
    </div>
    <div class="mode-hint" id="modeHint">点击画布放置正电荷</div>

    <div class="divider"></div>

    <div class="slider-row">
      <label>电荷量 <span id="qVal">1.0</span> q</label>
      <input type="range" id="qSlider" min="0.5" max="3" step="0.5" value="1" oninput="document.getElementById('qVal').textContent=this.value;redraw()">
    </div>
    <div class="slider-row">
      <label>场线密度 <span id="nVal">16</span></label>
      <input type="range" id="nSlider" min="8" max="32" step="4" value="16" oninput="document.getElementById('nVal').textContent=this.value;redraw()">
    </div>

    <div class="divider"></div>

    <div class="toggle-row">
      <span>显示等势线</span>
      <div class="toggle" id="togEqui" onclick="toggleEqui()"></div>
    </div>
    <div class="toggle-row">
      <span>显示箭头</span>
      <div class="toggle on" id="togArrow" onclick="toggleArrow()"></div>
    </div>
    <div class="toggle-row">
      <span>显示场强颜色</span>
      <div class="toggle on" id="togColor" onclick="toggleColor()"></div>
    </div>

    <div class="divider"></div>

    <div>
      <h3 style="margin-bottom:8px;">测量工具</h3>
      <div class="tool-btns">
        <div class="tool-btn active" id="toolNone" onclick="setTool('none')">无</div>
        <div class="tool-btn" id="toolProbe" onclick="setTool('probe')">探针</div>
        <div class="tool-btn" id="toolGrid" onclick="setTool('grid')">矢量网格</div>
      </div>
    </div>

    <div class="probe-panel" id="probePanel">
      <h4>探针读数</h4>
      <div class="probe-line"><span>E_x</span><span id="ppEx">—</span></div>
      <div class="probe-line"><span>E_y</span><span id="ppEy">—</span></div>
      <div class="probe-line"><span>|E|</span><span id="ppEm">—</span></div>
      <div class="probe-line"><span>方向</span><span id="ppAng">—</span></div>
      <div class="probe-line"><span>电势 V</span><span id="ppV">—</span></div>
    </div>

    <div class="divider"></div>

    <div class="clear-btn" onclick="clearAll()">清除全部电荷</div>

    <div class="divider"></div>

    <div>
      <h3 style="margin-bottom:8px;">图例</h3>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div>正电荷</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8;"></div>负电荷</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(255,200,50,0.7);width:24px;border-radius:2px;height:2px;"></div>电场线</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(160,100,255,0.6);width:24px;border-radius:2px;height:1px;"></div>等势线</div>
      </div>
    </div>
    <div class="report-fab" style="margin-top:auto;padding-top:12px">
      <button class="report-fab-btn" onclick="openReport()">
        <span class="rfb-icon">📄</span> 生成实验报告
      </button>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="simCanvas"></canvas>
    <div class="tip">拖动电荷可移动位置 · 探针模式下鼠标悬停查看场强</div>
    <div class="probe-tip" id="probeTip"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

let charges = [];
let mode = 'pos';
let showEqui = false, showArrow = true, showColor = true;
let dragging = null, dragOffX = 0, dragOffY = 0;
let activeTool = 'none';
let mouseX = 0, mouseY = 0;

function setTool(t) {
  activeTool = t;
  ['none','probe','grid'].forEach(n => document.getElementById('tool'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('active', n===t));
  canvas.style.cursor = t==='probe' ? 'cell' : 'crosshair';
  if (t!=='probe') document.getElementById('probeTip').style.display='none';
  redraw();
}

function setMode(m) {
  mode = m;
  document.getElementById('btnPos').classList.toggle('active', m==='pos');
  document.getElementById('btnNeg').classList.toggle('active', m==='neg');
  document.getElementById('btnErase').classList.toggle('active', m==='erase');
  const hints = { pos:'点击画布放置正电荷', neg:'点击画布放置负电荷', erase:'点击电荷将其删除' };
  document.getElementById('modeHint').textContent = hints[m];
}
function toggleEqui() { showEqui=!showEqui; document.getElementById('togEqui').classList.toggle('on',showEqui); redraw(); }
function toggleArrow() { showArrow=!showArrow; document.getElementById('togArrow').classList.toggle('on',showArrow); redraw(); }
function toggleColor() { showColor=!showColor; document.getElementById('togColor').classList.toggle('on',showColor); redraw(); }
function clearAll() { charges=[]; redraw(); }

function resize() {
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  redraw();
}
window.addEventListener('resize', resize);

// ── Electric field at (x,y) ──
function field(x, y) {
  let ex = 0, ey = 0;
  for (const c of charges) {
    const dx = x - c.x, dy = y - c.y;
    const r2 = dx*dx + dy*dy;
    if (r2 < 1) continue;
    const r = Math.sqrt(r2);
    const k = c.q / (r2 * r);
    ex += k * dx; ey += k * dy;
  }
  return [ex, ey];
}

function potential(x, y) {
  let v = 0;
  for (const c of charges) {
    const dx = x-c.x, dy = y-c.y;
    const r = Math.sqrt(dx*dx+dy*dy);
    if (r < 1) continue;
    v += c.q / r;
  }
  return v;
}

// ── Draw field lines from a charge ──
function traceFieldLine(sx, sy, sign) {
  const step = 4, maxSteps = 2000;
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  let x = sx, y = sy;
  const arrowInterval = 40;
  let dist = 0;

  for (let i = 0; i < maxSteps; i++) {
    let [ex, ey] = field(x, y);
    const emag = Math.sqrt(ex*ex+ey*ey);
    if (emag < 1e-10) break;
    ex /= emag; ey /= emag;
    const nx = x + sign * step * ex;
    const ny = y + sign * step * ey;

    // stop near opposite charge
    let hitCharge = false;
    for (const c of charges) {
      if (c.q * sign < 0) {
        const d2 = (nx-c.x)**2+(ny-c.y)**2;
        if (d2 < 100) { hitCharge=true; break; }
      }
    }
    if (hitCharge) { ctx.lineTo(nx, ny); break; }
    if (nx<0||nx>canvas.width||ny<0||ny>canvas.height) break;

    ctx.lineTo(nx, ny);

    // draw arrowhead
    if (showArrow) {
      dist += step;
      if (dist >= arrowInterval) {
        dist = 0;
        const ang = Math.atan2(sign*ey, sign*ex);
        const al = 14, aw = 4;
        ctx.save();
        ctx.translate(nx, ny);
        ctx.rotate(ang);
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(-al, -aw);
        ctx.lineTo(-al, aw);
        ctx.closePath();
        ctx.fillStyle = ctx.strokeStyle;
        ctx.fill();
        ctx.restore();
        ctx.beginPath();
        ctx.moveTo(nx, ny);
      }
    }
    x = nx; y = ny;
  }
  ctx.stroke();
}

// ── Draw equipotential lines via marching squares approximation ──
function drawEquipotentials() {
  const W = canvas.width, H = canvas.height;
  if (charges.length === 0) return;
  const levels = 20;
  const step = 30;

  // sample a grid
  const cols = Math.floor(W/step)+1, rows = Math.floor(H/step)+1;
  const grid = [];
  for (let r=0; r<rows; r++) {
    grid[r]=[];
    for (let c=0; c<cols; c++) grid[r][c] = potential(c*step, r*step);
  }

  // find value range
  let vmin=Infinity, vmax=-Infinity;
  for (let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    const v=grid[r][c];
    if(isFinite(v)&&Math.abs(v)<1e6){vmin=Math.min(vmin,v);vmax=Math.max(vmax,v);}
  }
  if (!isFinite(vmin)) return;

  ctx.save();
  ctx.strokeStyle = 'rgba(180,120,255,0.45)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);

  for (let l=1; l<levels; l++) {
    const iso = vmin + (vmax-vmin)*l/levels;
    // simple contour line via linear interpolation on grid edges
    for (let r=0; r<rows-1; r++) {
      for (let c=0; c<cols-1; c++) {
        const v00=grid[r][c], v10=grid[r][c+1], v01=grid[r+1][c], v11=grid[r+1][c+1];
        const x0=c*step, y0=r*step;
        const pts=[];
        // bottom edge
        if ((v00-iso)*(v10-iso)<0) { const t=(iso-v00)/(v10-v00); pts.push([x0+t*step, y0]); }
        // right edge
        if ((v10-iso)*(v11-iso)<0) { const t=(iso-v10)/(v11-v10); pts.push([x0+step, y0+t*step]); }
        // top edge
        if ((v01-iso)*(v11-iso)<0) { const t=(iso-v01)/(v11-v01); pts.push([x0+t*step, y0+step]); }
        // left edge
        if ((v00-iso)*(v01-iso)<0) { const t=(iso-v00)/(v01-v00); pts.push([x0, y0+t*step]); }
        if (pts.length>=2) {
          ctx.beginPath();
          ctx.moveTo(pts[0][0],pts[0][1]);
          ctx.lineTo(pts[1][0],pts[1][1]);
          ctx.stroke();
        }
      }
    }
  }
  ctx.restore();
}

// ── Background color map ──
function drawColorMap() {
  if (charges.length===0) return;
  const W=canvas.width, H=canvas.height;
  const pixStep = 8;
  const cols=Math.ceil(W/pixStep), rows=Math.ceil(H/pixStep);

  // find max field mag
  let maxE = 0;
  for (let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    const [ex,ey]=field(c*pixStep,r*pixStep);
    maxE=Math.max(maxE,Math.sqrt(ex*ex+ey*ey));
  }
  if (maxE===0) return;

  for (let r=0;r<rows;r++) {
    for (let c=0;c<cols;c++) {
      const [ex,ey]=field(c*pixStep,r*pixStep);
      const emag=Math.sqrt(ex*ex+ey*ey);
      const t=Math.min(emag/maxE, 1);
      const alpha = t*0.35;
      // blue (weak) → orange (strong)
      const R=Math.round(t*255), G=Math.round(t*100), B=Math.round((1-t)*200);
      ctx.fillStyle=`rgba(${R},${G},${B},${alpha})`;
      ctx.fillRect(c*pixStep, r*pixStep, pixStep, pixStep);
    }
  }
}

// ── Main draw ──
function redraw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (showColor) drawColorMap();
  if (showEqui) drawEquipotentials();

  // vector field grid mode
  if (activeTool === 'grid' && charges.length > 0) {
    drawVectorGrid();
  }

  // field lines
  const nLines = parseInt(document.getElementById('nSlider').value);
  for (const c of charges) {
    const n = Math.round(nLines * Math.abs(c.q));
    for (let i=0; i<n; i++) {
      const ang = (2*Math.PI*i)/n;
      const r0 = 14;
      const sx = c.x + r0*Math.cos(ang);
      const sy = c.y + r0*Math.sin(ang);
      ctx.strokeStyle = 'rgba(255,210,60,0.75)';
      ctx.lineWidth = 1.2;
      traceFieldLine(sx, sy, c.q>0 ? 1 : -1);
    }
  }

  // probe arrow on canvas
  if (activeTool === 'probe' && charges.length > 0) {
    drawProbeArrow(mouseX, mouseY);
  }

  // charges
  for (const c of charges) {
    const r = 12 + 4*(Math.abs(c.q)-0.5);
    const color = c.q>0 ? '#f87171' : '#38bdf8';
    ctx.beginPath();
    ctx.arc(c.x, c.y, r, 0, Math.PI*2);
    ctx.fillStyle = color+'33';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(c.q>0?'＋':'－', c.x, c.y+1);
  }
}

function drawVectorGrid() {
  const gridStep = 40;
  const W=canvas.width, H=canvas.height;
  let maxE=0;
  const pts=[];
  for(let y=gridStep/2;y<H;y+=gridStep) {
    for(let x=gridStep/2;x<W;x+=gridStep) {
      const [ex,ey]=field(x,y);
      const em=Math.sqrt(ex*ex+ey*ey);
      maxE=Math.max(maxE,em);
      pts.push({x,y,ex,ey,em});
    }
  }
  if(maxE===0) return;
  for(const p of pts) {
    const t=Math.min(p.em/maxE,1);
    const len=6+t*22;
    const ux=p.ex/p.em, uy=p.ey/p.em;
    const R=Math.round(t*255),G=Math.round(t*100),B=Math.round((1-t)*200);
    const col=`rgba(${R},${G},${B},0.75)`;
    const tx=p.x+ux*len, ty=p.y+uy*len;
    ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(p.x-ux*len*0.3,p.y-uy*len*0.3);ctx.lineTo(tx,ty);ctx.stroke();
    const ang=Math.atan2(uy,ux),as=5;
    ctx.beginPath();ctx.moveTo(tx,ty);
    ctx.lineTo(tx-as*Math.cos(ang-0.5),ty-as*Math.sin(ang-0.5));
    ctx.lineTo(tx-as*Math.cos(ang+0.5),ty-as*Math.sin(ang+0.5));
    ctx.closePath();ctx.fill();
  }
}

function drawProbeArrow(x,y) {
  const [ex,ey]=field(x,y);
  const em=Math.sqrt(ex*ex+ey*ey);
  if(em<1e-12)return;
  const len=Math.min(50,em*1e4);
  const ux=ex/em,uy=ey/em;
  ctx.save();
  ctx.strokeStyle='rgba(134,239,172,0.9)';ctx.fillStyle='rgba(134,239,172,0.9)';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+ux*len,y+uy*len);ctx.stroke();
  const ang=Math.atan2(uy,ux),as=9;
  ctx.beginPath();ctx.moveTo(x+ux*len,y+uy*len);
  ctx.lineTo(x+ux*len-as*Math.cos(ang-0.4),y+uy*len-as*Math.sin(ang-0.4));
  ctx.lineTo(x+ux*len-as*Math.cos(ang+0.4),y+uy*len-as*Math.sin(ang+0.4));
  ctx.closePath();ctx.fill();
  // cross at probe
  ctx.strokeStyle='rgba(134,239,172,0.5)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x-8,y);ctx.lineTo(x+8,y);ctx.moveTo(x,y-8);ctx.lineTo(x,y+8);ctx.stroke();
  ctx.restore();
}

// ── Interaction ──
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
  if (e.touches) return [(e.touches[0].clientX-rect.left)*scaleX, (e.touches[0].clientY-rect.top)*scaleY];
  return [(e.clientX-rect.left)*scaleX, (e.clientY-rect.top)*scaleY];
}

function nearCharge(x, y) {
  for (let i=charges.length-1; i>=0; i--) {
    const d2=(x-charges[i].x)**2+(y-charges[i].y)**2;
    if (d2 < 28*28) return i;
  }
  return -1;
}

canvas.addEventListener('mousedown', e => {
  const [x,y] = getPos(e);
  const idx = nearCharge(x,y);
  if (mode==='erase') {
    if (idx>=0) { charges.splice(idx,1); redraw(); }
    return;
  }
  if (idx>=0) {
    dragging=idx; dragOffX=x-charges[idx].x; dragOffY=y-charges[idx].y;
  } else {
    const q = parseFloat(document.getElementById('qSlider').value) * (mode==='neg'?-1:1);
    charges.push({x,y,q});
    redraw();
  }
});

canvas.addEventListener('mousemove', e => {
  const [x,y]=getPos(e);
  mouseX=x; mouseY=y;
  if (dragging!==null) {
    charges[dragging].x=x-dragOffX;
    charges[dragging].y=y-dragOffY;
    redraw();
    return;
  }
  if (activeTool==='probe' && charges.length>0) {
    const [ex,ey]=field(x,y);
    const em=Math.sqrt(ex*ex+ey*ey);
    const V=potential(x,y);
    const ang=(Math.atan2(-ey,ex)*180/Math.PI).toFixed(1);
    // sidebar
    document.getElementById('ppEx').textContent=ex.toFixed(4);
    document.getElementById('ppEy').textContent=ey.toFixed(4);
    document.getElementById('ppEm').textContent=em.toFixed(4);
    document.getElementById('ppAng').textContent=ang+'°';
    document.getElementById('ppV').textContent=isFinite(V)?V.toFixed(3):'∞';
    // floating tooltip
    const tip=document.getElementById('probeTip');
    tip.style.display='block';
    const rect=canvas.parentElement.getBoundingClientRect();
    const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
    tip.style.left=(cx+16)+'px'; tip.style.top=(cy+16)+'px';
    tip.innerHTML=`|E| = ${em.toFixed(4)}<br>V = ${isFinite(V)?V.toFixed(3):'∞'}<br>方向 = ${ang}°`;
    redraw();
  } else {
    document.getElementById('probeTip').style.display='none';
    if(activeTool==='grid') redraw();
  }
});

canvas.addEventListener('mouseup', () => { dragging=null; });
canvas.addEventListener('mouseleave', () => { dragging=null; document.getElementById('probeTip').style.display='none'; });

resize();
</script>

<script>
(function(){
  const EXP_NAME = '电场强度';
  const EXP_SEC  = '§1-2';
  const STORE_KEY = 'phy26_report_' + EXP_SEC.replace(/[§\/]/g,'');

  function loadSaved() {
    const d = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    if (d.name)       document.getElementById('rName').value      = d.name;
    if (d.stuId)      document.getElementById('rStuId').value     = d.stuId;
    if (d.date)       document.getElementById('rDate').value      = d.date;
    if (d.partner)    document.getElementById('rPartner').value   = d.partner;
    if (d.purpose)    document.getElementById('rPurpose').value   = d.purpose;
    if (d.process)    document.getElementById('rProcess').value   = d.process;
    if (d.data)       document.getElementById('rData').value      = d.data;
    if (d.analysis)   document.getElementById('rAnalysis').value  = d.analysis;
    if (d.error)      document.getElementById('rError').value     = d.error;
    if (d.conclusion) document.getElementById('rConclusion').value= d.conclusion;
  }

  function saveDraft() {
    const d = {
      name:       document.getElementById('rName').value,
      stuId:      document.getElementById('rStuId').value,
      date:       document.getElementById('rDate').value,
      partner:    document.getElementById('rPartner').value,
      purpose:    document.getElementById('rPurpose').value,
      process:    document.getElementById('rProcess').value,
      data:       document.getElementById('rData').value,
      analysis:   document.getElementById('rAnalysis').value,
      error:      document.getElementById('rError').value,
      conclusion: document.getElementById('rConclusion').value,
    };
    localStorage.setItem(STORE_KEY, JSON.stringify(d));
  }

  window.openReport = function() {
    document.getElementById('reportOverlay').classList.add('open');
    document.getElementById('reportOutput').classList.remove('show');
    document.getElementById('rmCopyBtn').style.display = 'none';
    const dateEl = document.getElementById('rDate');
    if (!dateEl.value) dateEl.value = new Date().toISOString().slice(0,10);
    loadSaved();
    const _d = {
      rPurpose:    '观察点电荷和电荷系统产生的电场分布，理解电场强度叠加原理，掌握电场线和等势线的绘制方法，定量分析不同电荷配置下的电场特征。',
      rProcess:    '放置单个正/负点电荷，观察电场线分布；设置等量异号电荷（电偶极子），观察电场线从正电荷出发终止于负电荷的规律；调整等势线数量（默认20条），观察等势线与电场线的正交关系；改变电荷量，观察电场强度变化。',
      rData:       '单正电荷：电场线均匀向外辐射，等势线为同心圆；电偶极子（+q和-q，间距d）：中点处E=2kq/d²，方向从+q指向-q；等量同号电荷：中点处E=0，两侧电场线向外弯曲；等势线与电场线处处垂直，强场区等势线密集。',
      rAnalysis:   '电场线疏密反映电场强度大小，方向表示正电荷受力方向。等势线与电场线正交，E=-∇V，即电场指向电势降低最快的方向。叠加原理在多电荷系统中得到验证：合场强等于各点电荷场强的矢量和。',
      rError:      '仿真中电场线数量有限，不能完全反映连续分布；等势线间距在强场区较密，弱场区较疏，视觉上可能产生误差。实际实验中还需考虑边界效应和导线干扰。',
      rConclusion: '点电荷电场线从正电荷出发（或终止于负电荷），等势线为同心圆；多电荷系统电场满足叠加原理；等势线与电场线处处正交，电场强度沿等势线法线方向指向电势降低方向。',
    };
    Object.entries(_d).forEach(([id, val]) => { const el = document.getElementById(id); if (el && !el.value) el.value = val; });
  };

  window.closeReport = function() {
    saveDraft();
    document.getElementById('reportOverlay').classList.remove('open');
  };

  window.overlayClick = function(e) {
    if (e.target === document.getElementById('reportOverlay')) closeReport();
  };

  window.generateReport = function() {
    const name       = document.getElementById('rName').value.trim();
    const stuId      = document.getElementById('rStuId').value.trim();
    const date       = document.getElementById('rDate').value || '—';
    const partner    = document.getElementById('rPartner').value.trim() || '—';
    const purpose    = document.getElementById('rPurpose').value.trim() || '（未填写）';
    const process    = document.getElementById('rProcess').value.trim() || '（未填写）';
    const data       = document.getElementById('rData').value.trim() || '（未填写）';
    const analysis   = document.getElementById('rAnalysis').value.trim() || '（未填写）';
    const error      = document.getElementById('rError').value.trim() || '（未填写）';
    const conclusion = document.getElementById('rConclusion').value.trim() || '（未填写）';

    if (!name || !stuId) { alert('请填写姓名和学号'); return; }
    saveDraft();

    const divider = '─'.repeat(40);
    const report = [
      '普通物理（卓越班）下册 · 电磁学',
      `实验报告：${EXP_NAME}（${EXP_SEC}）`,
      divider,
      `姓　　名：${name}　　　学　　号：${stuId}`,
      `实验日期：${date}　　　实验伙伴：${partner}`,
      divider,
      '',
      '一、实验目的',
      purpose,
      '',
      '二、实验步骤与观察',
      process,
      '',
      '三、实验数据记录',
      data,
      '',
      '四、结果分析',
      analysis,
      '',
      '五、误差分析与思考',
      error,
      '',
      '六、实验结论',
      conclusion,
      '',
      divider,
      `生成时间：${new Date().toLocaleString('zh-CN')}`,
      '本报告由 NUSEP26 普通物理（卓越班）实验仿真平台生成',
    ].join('\n');

    const out = document.getElementById('reportOutput');
    out.textContent = report;
    out.classList.add('show');
    document.getElementById('rmCopyBtn').style.display = 'inline-flex';
    out.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  window.copyReport = function() {
    const text = document.getElementById('reportOutput').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('rmCopyBtn');
      const orig = btn.textContent;
      btn.textContent = '✓ 已复制';
      setTimeout(() => btn.textContent = orig, 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      const btn = document.getElementById('rmCopyBtn');
      btn.textContent = '✓ 已复制';
      setTimeout(() => btn.textContent = '复制报告', 2000);
    });
  };

  ['rName','rStuId','rDate','rPartner','rPurpose','rProcess','rData','rAnalysis','rError','rConclusion']
    .forEach(id => document.getElementById(id).addEventListener('input', saveDraft));
})();
</script>
