</div>
<div class="layout">
  <div class="sidebar">
    <div class="ctrl-group">
      <h3>电荷 q₁</h3>
      <div class="charge-row">
        <label>符号</label>
        <div class="sign-btn pos active" id="s1p" onclick="setSign(1,'pos')">+</div>
        <div class="sign-btn neg" id="s1n" onclick="setSign(1,'neg')">−</div>
      </div>
      <div class="slider-row">
        <label>大小 |q₁| = <span id="q1Val">2.0</span> μC</label>
        <input type="range" id="q1Slider" min="0.5" max="5" step="0.5" value="2" oninput="update()">
      </div>
    </div>
    <div class="divider"></div>
    <div class="ctrl-group">
      <h3>电荷 q₂</h3>
      <div class="charge-row">
        <label>符号</label>
        <div class="sign-btn pos active" id="s2p" onclick="setSign(2,'pos')">+</div>
        <div class="sign-btn neg" id="s2n" onclick="setSign(2,'neg')">−</div>
      </div>
      <div class="slider-row">
        <label>大小 |q₂| = <span id="q2Val">2.0</span> μC</label>
        <input type="range" id="q2Slider" min="0.5" max="5" step="0.5" value="2" oninput="update()">
      </div>
    </div>
    <div class="divider"></div>
    <div class="ctrl-group">
      <h3>介质</h3>
      <div class="slider-row">
        <label>相对介电常数 εᵣ = <span id="erVal">1.0</span></label>
        <input type="range" id="erSlider" min="1" max="80" step="1" value="1" oninput="update()">
      </div>
    </div>
    <div class="divider"></div>
    <div class="result-panel">
      <h3>计算结果</h3>
      <div class="result-row">
        <span class="result-label">距离 r</span>
        <span><span class="result-value" id="resR">—</span><span class="result-unit">cm</span></span>
      </div>
      <div class="result-row">
        <span class="result-label">库仑力 |F|</span>
        <span><span class="result-value" id="resF">—</span><span class="result-unit">mN</span></span>
      </div>
      <div class="result-row">
        <span class="result-label">类型</span>
        <span><span class="result-value" id="resType">—</span></span>
      </div>
    </div>

      红色 = 正电荷 &nbsp;蓝色 = 负电荷<br>

    </div>

      </button>
    </div>

  <div class="canvas-wrap">
    <canvas id="coulombCanvas"></canvas>
    <div class="formula-bar">
      F = k·q₁q₂ / (εᵣ·r²) &nbsp;|&nbsp; k = 9×10⁹ N·m²/C²
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('coulombCanvas');
const ctx = canvas.getContext('2d');
const k = 9e9;

let signs = [1, 1];
let dragging = null;
const charges = [
  { x: 180, y: 180 },
  { x: 420, y: 180 }
];

function setSign(idx, s) {
  signs[idx-1] = s==='pos' ? 1 : -1;
  document.getElementById(`s${idx}p`).classList.toggle('active', s==='pos');
  document.getElementById(`s${idx}n`).classList.toggle('active', s==='neg');
  update();
}

function update() {
  const q1 = parseFloat(document.getElementById('q1Slider').value)*1e-6 * signs[0];
  const q2 = parseFloat(document.getElementById('q2Slider').value)*1e-6 * signs[1];
  const er = parseFloat(document.getElementById('erSlider').value);
  document.getElementById('q1Val').textContent = Math.abs(q1*1e6).toFixed(1);
  document.getElementById('q2Val').textContent = Math.abs(q2*1e6).toFixed(1);
  document.getElementById('erVal').textContent = er.toFixed(1);

  const pxPerM = 600; // 1m = 600px — scale: canvas px / pxPerM = meters
  const dx = charges[1].x - charges[0].x;
  const dy = charges[1].y - charges[0].y;
  const rPx = Math.sqrt(dx*dx+dy*dy);
  const rM = rPx / pxPerM;

  const F = k * Math.abs(q1) * Math.abs(q2) / (er * rM * rM);
  const attract = q1*q2 < 0;

  document.getElementById('resR').textContent = (rM*100).toFixed(1);
  document.getElementById('resF').textContent = (F*1000).toFixed(2);
  document.getElementById('resType').textContent = attract ? '吸引力' : '排斥力';

  draw(q1, q2, F, attract, er);
}

function draw(q1, q2, F, attract, er) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  const c1 = charges[0], c2 = charges[1];
  const dx = c2.x-c1.x, dy = c2.y-c1.y;
  const dist = Math.sqrt(dx*dx+dy*dy);
  const ux = dx/dist, uy = dy/dist;

  // distance line
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(c1.x,c1.y); ctx.lineTo(c2.x,c2.y); ctx.stroke();
  ctx.setLineDash([]);

  // r label
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='12px "Microsoft YaHei"';
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText(`r = ${(dist/600*100).toFixed(1)} cm`, (c1.x+c2.x)/2, (c1.y+c2.y)/2 - 6);

  // force arrows
  const arrowScale = Math.min(F*1e4, 80);
  const col = attract ? '#a78bfa' : '#fb923c';

  function drawArrow(fx, fy, tx, ty, color) {
    ctx.strokeStyle = color; ctx.fillStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(tx,ty); ctx.stroke();
    const ang = Math.atan2(ty-fy, tx-fx);
    const as = 9;
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx - as*Math.cos(ang-0.4), ty - as*Math.sin(ang-0.4));
    ctx.lineTo(tx - as*Math.cos(ang+0.4), ty - as*Math.sin(ang+0.4));
    ctx.closePath(); ctx.fill();
  }

  const r = 22;
  if (attract) {
    // arrows point toward each other
    drawArrow(c1.x - ux*r*0.5, c1.y - uy*r*0.5, c1.x + ux*arrowScale, c1.y + uy*arrowScale, col);
    drawArrow(c2.x + ux*r*0.5, c2.y + uy*r*0.5, c2.x - ux*arrowScale, c2.y - uy*arrowScale, col);
  } else {
    // arrows point away from each other
    drawArrow(c1.x + ux*r*0.5, c1.y + uy*r*0.5, c1.x - ux*arrowScale, c1.y - uy*arrowScale, col);
    drawArrow(c2.x - ux*r*0.5, c2.y - uy*r*0.5, c2.x + ux*arrowScale, c2.y + uy*arrowScale, col);
  }

  // F label
  ctx.fillStyle = col; ctx.font = 'bold 13px "Microsoft YaHei"';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(`F = ${(F*1000).toFixed(2)} mN`, (c1.x+c2.x)/2, Math.max(c1.y,c2.y)+16);

  // draw charges
  for (let i=0; i<2; i++) {
    const c = charges[i];
    const q = [q1,q2][i];
    const color = q>0 ? '#f87171' : '#38bdf8';
    const qLabel = q>0 ? '＋' : '－';
    // glow
    const grd = ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,r*2);
    grd.addColorStop(0, color+'44');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(c.x,c.y,r*2,0,Math.PI*2); ctx.fill();
    // circle
    ctx.beginPath(); ctx.arc(c.x,c.y,r,0,Math.PI*2);
    ctx.fillStyle=color+'33'; ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
    // symbol
    ctx.fillStyle='#fff'; ctx.font='bold 18px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(qLabel, c.x, c.y+1);
    // label
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='12px "Microsoft YaHei"';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(`q${i+1} = ${(Math.abs([q1,q2][i])*1e6).toFixed(1)} μC`, c.x, c.y+r+6);
  }

  // εᵣ label if not vacuum
  if (er > 1) {
    ctx.fillStyle='rgba(52,211,153,0.5)'; ctx.font='12px "Microsoft YaHei"';
    ctx.textAlign='right'; ctx.textBaseline='bottom';
    ctx.fillText(`εᵣ = ${er}`, W-16, H-12);
  }
}

// drag
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return [(e.clientX-rect.left)*canvas.width/rect.width, (e.clientY-rect.top)*canvas.height/rect.height];
}
canvas.addEventListener('mousedown', e => {
  const [mx,my]=getPos(e);
  for(let i=0;i<2;i++){
    const d2=(mx-charges[i].x)**2+(my-charges[i].y)**2;
    if(d2<30*30){dragging=i;break;}
  }
});
canvas.addEventListener('mousemove', e => {
  if(dragging===null)return;
  const [mx,my]=getPos(e);
  charges[dragging].x=Math.max(30,Math.min(canvas.width-30,mx));
  charges[dragging].y=Math.max(30,Math.min(canvas.height-60,my));
  update();
});
canvas.addEventListener('mouseup',()=>dragging=null);
canvas.addEventListener('mouseleave',()=>dragging=null);

function resizeCanvas(){
  const nw=canvas.offsetWidth,nh=canvas.offsetHeight;
  if(canvas.width&&canvas.height){const sx=nw/canvas.width,sy=nh/canvas.height;charges.forEach(c=>{c.x*=sx;c.y*=sy;});}
  else{charges[0]={x:nw*0.3,y:nh*0.5};charges[1]={x:nw*0.7,y:nh*0.5};}
  canvas.width=nw;canvas.height=nh;update();
}
window.addEventListener('resize',resizeCanvas);
setTimeout(resizeCanvas,80);
</script>

      <button class="rm-btn rm-btn-cancel" onclick="closeReport()">取消</button>
      <button class="rm-btn rm-btn-copy" id="rmCopyBtn" onclick="copyReport()">复制报告</button>
      <button class="rm-btn rm-btn-gen" onclick="generateReport()">生成报告</button>
    </div>
  </div>
</div>

<script>
(function(){
  const EXP_NAME = '库仑定律';
  const EXP_SEC  = '§1-1';
  const STORE_KEY = 'phy26_report_' + EXP_SEC.replace(/[§\/]/g,'');

  function loadSaved() {
    const d = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    if (d.name)       document.getElementById('rName').value      = d.name;
    if (d.stuId)      document.getElementById('rStuId').value     = d.stuId;
    if (d.date)       document.getElementById('rDate').value      = d.date;
    if (d.partner)    document.getElementById('rPartner').value   = d.partner;
    if (d.purpose)    document.getElementById('rPurpose').value   = d.purpose;
    if (d.process)    document.getElementById('rProcess').value   = d.process;
    if (d.data)       document.getElementById('rData').value      = d.data;
    if (d.analysis)   document.getElementById('rAnalysis').value  = d.analysis;
    if (d.error)      document.getElementById('rError').value     = d.error;
    if (d.conclusion) document.getElementById('rConclusion').value= d.conclusion;
  }

  function saveDraft() {
    const d = {
      name:       document.getElementById('rName').value,
      stuId:      document.getElementById('rStuId').value,
      date:       document.getElementById('rDate').value,
      partner:    document.getElementById('rPartner').value,
      purpose:    document.getElementById('rPurpose').value,
      process:    document.getElementById('rProcess').value,
      data:       document.getElementById('rData').value,
      analysis:   document.getElementById('rAnalysis').value,
      error:      document.getElementById('rError').value,
      conclusion: document.getElementById('rConclusion').value,
    };
    localStorage.setItem(STORE_KEY, JSON.stringify(d));
  }

  window.openReport = function() {
    document.getElementById('reportOverlay').classList.add('open');
    document.getElementById('reportOutput').classList.remove('show');
    document.getElementById('rmCopyBtn').style.display = 'none';
    const dateEl = document.getElementById('rDate');
    if (!dateEl.value) dateEl.value = new Date().toISOString().slice(0,10);
    loadSaved();
    const _d = {
      rPurpose:    '验证库仑定律，研究两点电荷间静电力与电荷量、距离的定量关系，理解叠加原理在多电荷系统中的应用。',
      rProcess:    '设置两个点电荷，分别改变电荷量（q₁、q₂）和间距r，记录对应的静电力F；保持一个变量不变改变另一个，验证F∝q₁q₂/r²；观察力的方向随电荷符号的变化；设置多电荷系统，验证叠加原理。',
      rData:       '固定r=1.0m，q₁=1μC：q₂=1μC时F=8.99N，q₂=2μC时F=17.98N，q₂=4μC时F=35.96N（F∝q₂）；固定q₁=q₂=1μC：r=1m时F=8.99N，r=2m时F=2.25N，r=3m时F=1.00N（F∝1/r²）。',
      rAnalysis:   '数据表明F与q₁q₂成正比，与r²成反比，与库仑定律F=kq₁q₂/r²完全吻合，比例系数k≈8.99×10⁹N·m²/C²。多电荷系统中合力等于各库仑力的矢量叠加，验证了叠加原理。',
      rError:      '仿真实验无测量误差，与理论值完全一致。实际实验中需考虑感应电荷对测量的干扰、悬线扭转角读数误差、电荷泄漏等因素，可能导致2%~5%的系统误差。',
      rConclusion: '验证了库仑定律：两点电荷间静电力大小与两电荷量之积成正比，与距离平方成反比，方向沿连线；多电荷系统满足叠加原理，合力等于各库仑力的矢量和。',
    };
    Object.entries(_d).forEach(([id, val]) => { const el = document.getElementById(id); if (el && !el.value) el.value = val; });
  };

  window.closeReport = function() {
    saveDraft();
    document.getElementById('reportOverlay').classList.remove('open');
  };

  window.overlayClick = function(e) {
    if (e.target === document.getElementById('reportOverlay')) closeReport();
  };

  window.generateReport = function() {
    const name       = document.getElementById('rName').value.trim();
    const stuId      = document.getElementById('rStuId').value.trim();
    const date       = document.getElementById('rDate').value || '—';
    const partner    = document.getElementById('rPartner').value.trim() || '—';
    const purpose    = document.getElementById('rPurpose').value.trim() || '（未填写）';
    const process    = document.getElementById('rProcess').value.trim() || '（未填写）';
    const data       = document.getElementById('rData').value.trim() || '（未填写）';
    const analysis   = document.getElementById('rAnalysis').value.trim() || '（未填写）';
    const error      = document.getElementById('rError').value.trim() || '（未填写）';
    const conclusion = document.getElementById('rConclusion').value.trim() || '（未填写）';

    if (!name || !stuId) { alert('请填写姓名和学号'); return; }
    saveDraft();

    const divider = '─'.repeat(40);
    const report = [
      '普通物理（卓越班）下册 · 电磁学',
      `实验报告：${EXP_NAME}（${EXP_SEC}）`,
      divider,
      `姓　　名：${name}　　　学　　号：${stuId}`,
      `实验日期：${date}　　　实验伙伴：${partner}`,
      divider,
      '',
      '一、实验目的',
      purpose,
      '',
      '二、实验步骤与观察',
      process,
      '',
      '三、实验数据记录',
      data,
      '',
      '四、结果分析',
      analysis,
      '',
      '五、误差分析与思考',
      error,
      '',
      '六、实验结论',
      conclusion,
      '',
      divider,
      `生成时间：${new Date().toLocaleString('zh-CN')}`,
      '本报告由 NUSEP26 普通物理（卓越班）实验仿真平台生成',
    ].join('\n');

    const out = document.getElementById('reportOutput');
    out.textContent = report;
    out.classList.add('show');
    document.getElementById('rmCopyBtn').style.display = 'inline-flex';
    out.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  window.copyReport = function() {
    const text = document.getElementById('reportOutput').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('rmCopyBtn');
      const orig = btn.textContent;
      btn.textContent = '✓ 已复制';
      setTimeout(() => btn.textContent = orig, 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      const btn = document.getElementById('rmCopyBtn');
      btn.textContent = '✓ 已复制';
      setTimeout(() => btn.textContent = '复制报告', 2000);
    });
  };

  ['rName','rStuId','rDate','rPartner','rPurpose','rProcess','rData','rAnalysis','rError','rConclusion']
    .forEach(id => document.getElementById(id).addEventListener('input', saveDraft));
})();
</script>

</body>
</html>
