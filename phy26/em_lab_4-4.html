<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#e2e8f0;display:flex;flex-direction:column;overflow:hidden}
  #topbar{display:flex;align-items:center;gap:14px;padding:10px 20px;background:rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(8px);flex-shrink:0;z-index:10}
  #topbar a.back-btn{text-decoration:none;color:#fbbf24;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:8px;padding:5px 13px;font-size:13px;transition:background .2s}
  #topbar a.back-btn:hover{background:rgba(251,191,36,0.22)}
  .topbar-title-wrap{display:flex;flex-direction:column;gap:2px}
  .topbar-title{font-size:16px;font-weight:700;color:#fff}
  .topbar-course{font-size:11px;color:rgba(255,255,255,0.38);letter-spacing:1px}
  .topbar-sub{margin-left:auto;font-size:12px;color:rgba(255,255,255,0.3)}
  #main{display:flex;flex:1;overflow:hidden}
  #sidebar{width:260px;flex-shrink:0;background:rgba(255,255,255,0.04);border-right:1px solid rgba(255,255,255,0.08);overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:14px}
  #sidebar::-webkit-scrollbar{width:4px}
  #sidebar::-webkit-scrollbar-thumb{background:rgba(251,191,36,0.3);border-radius:2px}
  .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#fbbf24;margin-bottom:6px;border-bottom:1px solid rgba(251,191,36,0.2);padding-bottom:4px}
  .exp-btn{width:100%;text-align:left;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 14px;cursor:pointer;color:rgba(255,255,255,0.7);font-size:13px;font-family:'Microsoft YaHei',sans-serif;transition:all .2s;display:flex;align-items:center;gap:10px}
  .exp-btn:hover{background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3);color:#fff}
  .exp-btn.active{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.5);color:#fbbf24;font-weight:600}
  .exp-icon{font-size:18px;flex-shrink:0}
  .exp-info{display:flex;flex-direction:column;gap:2px}
  .exp-name{font-size:13px;font-weight:600}
  .exp-desc{font-size:11px;color:rgba(255,255,255,0.4)}
  .ctrl-group{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px}
  .ctrl-label{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.8px;margin-bottom:8px;font-family:'Microsoft YaHei',sans-serif}
  .slider-wrap{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .slider-wrap label{font-size:12px;color:rgba(255,255,255,0.6);min-width:60px;font-family:'Microsoft YaHei',sans-serif}
  .slider-wrap input[type=range]{flex:1;accent-color:#fbbf24;height:4px}
  .slider-wrap span{font-size:12px;color:#fbbf24;font-weight:600;min-width:52px;text-align:right}
  .action-btn{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(251,191,36,0.3);background:rgba(251,191,36,0.1);color:#fbbf24;font-size:13px;font-family:'Microsoft YaHei',sans-serif;cursor:pointer;transition:all .2s;margin-top:4px}
  .action-btn:hover{background:rgba(251,191,36,0.25);border-color:rgba(251,191,36,0.6);color:#fff}
  .action-btn.primary{background:linear-gradient(135deg,#f59e0b,#fbbf24);border-color:transparent;color:#1a1200;font-weight:700}
  .readout-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
  .readout{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:8px 10px;text-align:center}
  .readout-val{font-size:16px;font-weight:800;color:#fbbf24;font-family:'Times New Roman',serif}
  .readout-label{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;letter-spacing:0.5px}
  #canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #exp-title-bar{padding:10px 20px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:12px;flex-shrink:0}
  #exp-title{font-size:15px;font-weight:700;color:#fbbf24;font-family:'Microsoft YaHei',sans-serif}
  #exp-subtitle{font-size:12px;color:rgba(255,255,255,0.4)}
  #canvas-wrap{flex:1;overflow:hidden}
  canvas#simCanvas{display:block;width:100%;height:100%;background:rgba(0,0,0,0.3)}
  #info-bar{padding:8px 20px;background:rgba(0,0,0,0.2);border-top:1px solid rgba(255,255,255,0.06);font-size:12px;color:rgba(255,255,255,0.4);font-family:'Microsoft YaHei',sans-serif;flex-shrink:0}
</style>

<body>
<div id="topbar">
  <a class="back-btn" href="em.html">← 电磁学</a>
  <div class="topbar-title-wrap">
    <div class="topbar-title">§4-4 磁场的能量</div>
    <div class="topbar-course">普通物理（卓越班）下册 · 电磁学 · 仿真实验</div>
  </div>
  <div class="topbar-sub">NUSEP26</div>
</div>
<div id="main">
  <div id="sidebar">
    <div>
      <div class="section-title">实验选择</div>
      <button class="exp-btn active" onclick="loadExp(0)">
        <span class="exp-icon">🔋</span>
        <div class="exp-info"><div class="exp-name">磁场能量储存</div><div class="exp-desc">W_m = ½LI²</div></div>
      </button>
      <button class="exp-btn" onclick="loadExp(1)">
        <span class="exp-icon">🌡️</span>
        <div class="exp-info"><div class="exp-name">能量密度分布</div><div class="exp-desc">ω_m = B²/2μ</div></div>
      </button>
      <button class="exp-btn" onclick="loadExp(2)">
        <span class="exp-icon">⚖️</span>
        <div class="exp-info"><div class="exp-name">电磁能量对比</div><div class="exp-desc">电场能 vs 磁场能</div></div>
      </button>
    </div>
    <div id="ctrl-panel"></div>
    <div class="readout-grid">
      <div class="readout"><div class="readout-val" id="ro1">—</div><div class="readout-label" id="ro1l">W_m (J)</div></div>
      <div class="readout"><div class="readout-val" id="ro2">—</div><div class="readout-label" id="ro2l">I (A)</div></div>
      <div class="readout"><div class="readout-val" id="ro3">—</div><div class="readout-label" id="ro3l">ω_m (J/m³)</div></div>
      <div class="readout"><div class="readout-val" id="ro4">—</div><div class="readout-label" id="ro4l">τ (s)</div></div>
    </div>
    <div style="margin-top:auto;padding-top:12px"><button onclick="openReport()" style="width:100%;padding:10px;border-radius:10px;border:1px solid rgba(52,211,153,0.4);background:rgba(52,211,153,0.1);color:#34d399;font-size:13px;font-family:'Microsoft YaHei',sans-serif;cursor:pointer;font-weight:700;">📄 生成实验报告</button></div>
  </div>
  <div id="canvas-area">
    <div id="exp-title-bar">
      <div id="exp-title">磁场能量储存</div>
      <div id="exp-subtitle">RL 电路充电过程中磁场能量的积累</div>
    </div>
    <div id="canvas-wrap"><canvas id="simCanvas"></canvas></div>
    <div id="info-bar">提示：调节参数观察磁场能量随电流的变化</div>
  </div>
</div>
<script>
const canvas=document.getElementById('simCanvas');
const ctx=canvas.getContext('2d');
let animId=null,simT=0,curExp=0;

const EXPS=[
  {title:'磁场能量储存',subtitle:'RL 电路充电过程中磁场能量的积累，W_m = ½LI²',
   ctrls:`<div class="ctrl-group"><div class="ctrl-label">参数控制</div>
    <div class="slider-wrap"><label>L (H)</label><input type="range" id="p0_L" min="0.1" max="5" step="0.1" value="2" oninput="redraw()"><span id="p0_L_v">2.0 H</span></div>
    <div class="slider-wrap"><label>R (Ω)</label><input type="range" id="p0_R" min="0.5" max="10" step="0.5" value="2" oninput="redraw()"><span id="p0_R_v">2.0 Ω</span></div>
    <div class="slider-wrap"><label>ε (V)</label><input type="range" id="p0_E" min="1" max="20" step="1" value="10" oninput="redraw()"><span id="p0_E_v">10 V</span></div>
    <button class="action-btn primary" onclick="toggleAnim()">▶ 开始充电</button>
    <button class="action-btn" onclick="resetSim()">重置</button></div>`,
   ro:['W_m (J)','I (A)','W_R (J)','t (s)']},
  {title:'磁场能量密度分布',subtitle:'同轴电缆截面内 ω_m = B²/2μ ∝ 1/r²',
   ctrls:`<div class="ctrl-group"><div class="ctrl-label">参数控制</div>
    <div class="slider-wrap"><label>电流 I (A)</label><input type="range" id="p1_I" min="1" max="30" step="1" value="10" oninput="redraw()"><span id="p1_I_v">10 A</span></div>
    <div class="slider-wrap"><label>R₂/R₁</label><input type="range" id="p1_ratio" min="1.5" max="8" step="0.5" value="3" oninput="redraw()"><span id="p1_ratio_v">3.0</span></div>
    <button class="action-btn primary" onclick="toggleAnim()">▶ 动画</button></div>`,
   ro:['W_m (μJ/m)','ω_max (μJ/m³)','ln(R₂/R₁)','—']},
  {title:'电场能量 vs 磁场能量',subtitle:'LC 振荡回路中能量在电场与磁场之间转换',
   ctrls:`<div class="ctrl-group"><div class="ctrl-label">参数控制</div>
    <div class="slider-wrap"><label>L (H)</label><input type="range" id="p2_L" min="0.1" max="2" step="0.1" value="0.5" oninput="redraw()"><span id="p2_L_v">0.5 H</span></div>
    <div class="slider-wrap"><label>C (μF)</label><input type="range" id="p2_C" min="1" max="100" step="1" value="20" oninput="redraw()"><span id="p2_C_v">20 μF</span></div>
    <div class="slider-wrap"><label>V₀ (V)</label><input type="range" id="p2_V0" min="1" max="20" step="1" value="10" oninput="redraw()"><span id="p2_V0_v">10 V</span></div>
    <button class="action-btn primary" onclick="toggleAnim()">▶ 振荡</button>
    <button class="action-btn" onclick="resetSim()">重置</button></div>`,
   ro:['W_e (mJ)','W_m (mJ)','W_总 (mJ)','t (ms)']}
];

function loadExp(i){
  curExp=i;simT=0;
  if(animId){cancelAnimationFrame(animId);animId=null;}
  document.querySelectorAll('.exp-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.getElementById('exp-title').textContent=EXPS[i].title;
  document.getElementById('exp-subtitle').textContent=EXPS[i].subtitle;
  document.getElementById('ctrl-panel').innerHTML=EXPS[i].ctrls;
  const ro=EXPS[i].ro;
  ['ro1l','ro2l','ro3l','ro4l'].forEach((id,j)=>document.getElementById(id).textContent=ro[j]);
  redraw();
}
function toggleAnim(){
  if(animId){cancelAnimationFrame(animId);animId=null;return;}
  function frame(){simT+=0.025;redraw();animId=requestAnimationFrame(frame);}
  frame();
}
function resetSim(){simT=0;if(animId){cancelAnimationFrame(animId);animId=null;}redraw();}
function gv(id){const el=document.getElementById(id);return el?parseFloat(el.value):0;}
function sv(id,txt){const el=document.getElementById(id);if(el)el.textContent=txt;}
function ro(i,v){const el=document.getElementById('ro'+(i+1));if(el)el.textContent=v;}

function redraw(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  if(curExp===0)drawEnergy(W,H);
  else if(curExp===1)drawDensity(W,H);
  else drawLC(W,H);
}

function drawEnergy(W,H){
  const L=gv('p0_L'),R=gv('p0_R'),E=gv('p0_E');
  sv('p0_L_v',L.toFixed(1)+' H');sv('p0_R_v',R.toFixed(1)+' Ω');sv('p0_E_v',E.toFixed(0)+' V');
  const tau=L/R,I0=E/R,Wmax=0.5*L*I0*I0;
  const tMax=5*tau;
  const pad={l:60,r:20,t:24,b:40};
  const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){const y=pad.t+gH*i/5;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+gW,y);ctx.stroke();}
  for(let i=0;i<=5;i++){const x=pad.l+gW*i/5;ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+gH);ctx.stroke();}
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,pad.t+gH);ctx.lineTo(pad.l+gW,pad.t+gH);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='11px Times New Roman';ctx.textAlign='right';
  for(let i=0;i<=5;i++){ctx.fillText((Wmax*i/5).toFixed(3)+'J',pad.l-4,pad.t+gH*(1-i/5)+4);}
  ctx.textAlign='center';
  for(let i=0;i<=5;i++){ctx.fillText((tMax*i/5).toFixed(2)+'s',pad.l+gW*i/5,pad.t+gH+14);}
  // W_m curve
  ctx.strokeStyle='rgba(251,191,36,0.9)';ctx.lineWidth=2.5;ctx.beginPath();
  for(let px=0;px<=gW;px++){
    const t=tMax*px/gW;
    const I=I0*(1-Math.exp(-t/tau));
    const Wm=0.5*L*I*I;
    const y=pad.t+gH*(1-Wm/Wmax);
    px===0?ctx.moveTo(pad.l+px,y):ctx.lineTo(pad.l+px,y);
  }
  ctx.stroke();
  // W_R curve (cumulative heat)
  ctx.strokeStyle='rgba(248,113,113,0.7)';ctx.lineWidth=2;ctx.beginPath();
  for(let px=0;px<=gW;px++){
    const t=tMax*px/gW;
    const WR=E*I0*t-0.5*L*I0*I0*(1-Math.exp(-t/tau))*(1-Math.exp(-t/tau))-0.5*L*(I0*(1-Math.exp(-t/tau)))**2;
    const WRapprox=E*I0*t*(1-Math.exp(-t/tau))-0.5*L*(I0*(1-Math.exp(-t/tau)))**2;
    const y=pad.t+gH*(1-Math.max(WRapprox,0)/Wmax);
    px===0?ctx.moveTo(pad.l+px,y):ctx.lineTo(pad.l+px,y);
  }
  ctx.stroke();
  // Current dot
  const tCur=Math.min(simT,tMax);
  const ICur=I0*(1-Math.exp(-tCur/tau));
  const WmCur=0.5*L*ICur*ICur;
  const xCur=pad.l+gW*tCur/tMax;
  const yCur=pad.t+gH*(1-WmCur/Wmax);
  ctx.fillStyle='rgba(251,191,36,1)';ctx.beginPath();ctx.arc(xCur,yCur,5,0,Math.PI*2);ctx.fill();
  // Legend
  ctx.font='12px "Microsoft YaHei"';ctx.textAlign='left';
  ctx.fillStyle='rgba(251,191,36,0.9)';ctx.fillText('W_m = ½LI²',pad.l+8,pad.t+16);
  ctx.fillStyle='rgba(248,113,113,0.7)';ctx.fillText('W_R（电阻热）',pad.l+100,pad.t+16);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText('τ='+tau.toFixed(2)+'s  W_max='+Wmax.toFixed(3)+'J',pad.l+8,pad.t+gH-8);
  const WRCur=E*I0*tCur-WmCur-0.5*L*I0*I0*(1-Math.exp(-tCur/tau));
  ro(0,WmCur.toFixed(4));ro(1,ICur.toFixed(3));ro(2,Math.max(WRCur,0).toFixed(4));ro(3,tCur.toFixed(2));
}

function drawDensity(W,H){
  const I=gv('p1_I'),ratio=gv('p1_ratio');
  sv('p1_I_v',I.toFixed(0)+' A');sv('p1_ratio_v',ratio.toFixed(1));
  const mu0=4*Math.PI*1e-7;
  const R1=30,R2=R1*ratio;
  const cx=W*0.3,cy=H/2;
  // Heatmap
  const imgData=ctx.createImageData(Math.floor(W*0.55),H);
  const omMax=mu0*I*I/(8*Math.PI*Math.PI*(R1*0.01)**2)*1e6;
  for(let py=0;py<H;py++){
    for(let px=0;px<Math.floor(W*0.55);px++){
      const dx=px-cx,dy=py-cy,r=Math.sqrt(dx*dx+dy*dy);
      let om=0;
      if(r>=R1&&r<=R2){const B=mu0*I/(2*Math.PI*r*0.01);om=B*B/(2*mu0)*1e6;}
      const t=Math.min(om/omMax,1);
      const idx=(py*Math.floor(W*0.55)+px)*4;
      imgData.data[idx]=Math.floor(t*245);imgData.data[idx+1]=Math.floor(t*158);imgData.data[idx+2]=11;imgData.data[idx+3]=Math.floor(t*220+15);
    }
  }
  ctx.putImageData(imgData,0,0);
  // Conductors
  ctx.beginPath();ctx.arc(cx,cy,R1,0,Math.PI*2);ctx.fillStyle='rgba(251,191,36,0.2)';ctx.fill();ctx.strokeStyle='rgba(251,191,36,0.8)';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,R2,0,Math.PI*2);ctx.strokeStyle='rgba(251,191,36,0.5)';ctx.lineWidth=2.5;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='11px "Microsoft YaHei"';ctx.textAlign='center';
  ctx.fillText('R₁',cx,cy-R1-6);ctx.fillText('R₂',cx,cy-R2-6);
  // ω_m(r) curve on right
  const gx=W*0.6,gy=H*0.1,gW2=W*0.36,gH2=H*0.8;
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx,gy+gH2);ctx.lineTo(gx+gW2,gy+gH2);ctx.stroke();
  ctx.strokeStyle='rgba(251,191,36,0.9)';ctx.lineWidth=2.5;ctx.beginPath();
  let first=true;
  for(let px=0;px<=gW2;px++){
    const r=R1*0.5+px/gW2*(R2*1.3-R1*0.5);
    const om=(r>=R1&&r<=R2)?1/(r*r):0;
    const y=gy+gH2*(1-om/(1/(R1*R1))*0.95);
    if(first){ctx.moveTo(gx+px,y);first=false;}else ctx.lineTo(gx+px,y);
  }
  ctx.stroke();
  const xR1=gx+(R1-R1*0.5)/(R2*1.3-R1*0.5)*gW2;
  const xR2=gx+(R2-R1*0.5)/(R2*1.3-R1*0.5)*gW2;
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(xR1,gy);ctx.lineTo(xR1,gy+gH2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(xR2,gy);ctx.lineTo(xR2,gy+gH2);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px Times New Roman';ctx.textAlign='center';
  ctx.fillText('R₁',xR1,gy+gH2+12);ctx.fillText('R₂',xR2,gy+gH2+12);
  ctx.fillStyle='rgba(251,191,36,0.7)';ctx.font='11px "Microsoft YaHei"';ctx.fillText('ωₘ(r) ∝ 1/r²',gx+gW2/2,gy-4);
  const Wm=mu0*I*I/(4*Math.PI)*Math.log(ratio)*1e6;
  ro(0,Wm.toFixed(2));ro(1,omMax.toFixed(2));ro(2,Math.log(ratio).toFixed(3));ro(3,'—');
}

function drawLC(W,H){
  const L=gv('p2_L'),C=gv('p2_C')*1e-6,V0=gv('p2_V0');
  sv('p2_L_v',L.toFixed(1)+' H');sv('p2_C_v',(C*1e6).toFixed(0)+' μF');sv('p2_V0_v',V0.toFixed(0)+' V');
  const omega=1/Math.sqrt(L*C);
  const W0=0.5*C*V0*V0;
  const t=simT;
  const We=W0*Math.cos(omega*t)**2;
  const Wm=W0*Math.sin(omega*t)**2;
  const Wtot=We+Wm;
  // Pie chart
  const cx=W*0.35,cy=H/2,r=120;
  const angE=We/W0*Math.PI*2;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,0,angE);ctx.closePath();
  ctx.fillStyle='rgba(56,189,248,0.7)';ctx.fill();
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angE,Math.PI*2);ctx.closePath();
  ctx.fillStyle='rgba(251,191,36,0.7)';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(56,189,248,0.9)';ctx.font='13px "Microsoft YaHei"';ctx.textAlign='center';
  ctx.fillText('W_e = '+(We*1000).toFixed(2)+' mJ',cx,cy-r-14);
  ctx.fillStyle='rgba(251,191,36,0.9)';
  ctx.fillText('W_m = '+(Wm*1000).toFixed(2)+' mJ',cx,cy+r+20);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='bold 14px "Microsoft YaHei"';
  ctx.fillText('W_总 = '+(Wtot*1000).toFixed(2)+' mJ（守恒）',cx,cy+r+40);
  // Time curve on right
  const gx=W*0.6,gy=H*0.08,gW2=W*0.36,gH2=H*0.82;
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx,gy+gH2);ctx.lineTo(gx+gW2,gy+gH2);ctx.stroke();
  const tMax=4*Math.PI/omega;
  ctx.strokeStyle='rgba(56,189,248,0.8)';ctx.lineWidth=2;ctx.beginPath();
  for(let px=0;px<=gW2;px++){const tt=tMax*px/gW2;const we=W0*Math.cos(omega*tt)**2;const y=gy+gH2*(1-we/W0);px===0?ctx.moveTo(gx+px,y):ctx.lineTo(gx+px,y);}
  ctx.stroke();
  ctx.strokeStyle='rgba(251,191,36,0.8)';ctx.lineWidth=2;ctx.beginPath();
  for(let px=0;px<=gW2;px++){const tt=tMax*px/gW2;const wm=W0*Math.sin(omega*tt)**2;const y=gy+gH2*(1-wm/W0);px===0?ctx.moveTo(gx+px,y):ctx.lineTo(gx+px,y);}
  ctx.stroke();
  // Current time marker
  const xCur=gx+gW2*(t%tMax)/tMax;
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(xCur,gy);ctx.lineTo(xCur,gy+gH2);ctx.stroke();ctx.setLineDash([]);
  ctx.font='11px "Microsoft YaHei"';ctx.textAlign='left';
  ctx.fillStyle='rgba(56,189,248,0.8)';ctx.fillText('W_e',gx+4,gy+14);
  ctx.fillStyle='rgba(251,191,36,0.8)';ctx.fillText('W_m',gx+40,gy+14);
  ro(0,(We*1000).toFixed(3));ro(1,(Wm*1000).toFixed(3));ro(2,(Wtot*1000).toFixed(3));ro(3,(t*1000).toFixed(1));
}

function resizeCanvas(){const w=canvas.parentElement;canvas.width=w.clientWidth;canvas.height=w.clientHeight;redraw();}
window.addEventListener('resize',resizeCanvas);
window.addEventListener('DOMContentLoaded',()=>{loadExp(0);setTimeout(resizeCanvas,80);});
</script>

<style>

.report-modal{background:#0e0c24;border:1px solid rgba(255,255,255,0.1);border-radius:20px;width:min(760px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.7);animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1) both}

.rm-header{padding:24px 28px 20px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between}

.rm-body{padding:24px 28px;display:flex;flex-direction:column;gap:16px}

.rm-label{font-size:12px;color:rgba(255,255,255,0.45);font-family:"Microsoft YaHei",sans-serif;letter-spacing:0.5px}
.rm-label span{color:#f87171}
.rm-input,.rm-textarea{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;font-family:"Microsoft YaHei",sans-serif;outline:none;transition:border-color 0.2s;width:100%}
.rm-input:focus,.rm-textarea:focus{border-color:rgba(52,211,153,0.5)}
.rm-textarea{resize:vertical;min-height:80px;line-height:1.8}
.rm-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.rm-section-title{font-size:12px;font-weight:700;color:rgba(52,211,153,0.8);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid rgba(52,211,153,0.15);padding-bottom:8px;margin-top:4px;font-family:"Microsoft YaHei",sans-serif}
.rm-footer{padding:16px 28px 24px;display:flex;gap:12px;justify-content:flex-end}
.rm-btn{padding:10px 28px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:"Microsoft YaHei",sans-serif;transition:opacity 0.2s,transform 0.15s}

.report-output{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:20px 24px;margin:0 28px 24px;font-family:"Microsoft YaHei","Times New Roman",serif;font-size:13.5px;color:rgba(255,255,255,0.85);line-height:2;white-space:pre-wrap;display:none;max-height:340px;overflow-y:auto}

</style>
<div class="report-overlay" id="reportOverlay" onclick="overlayClick(event)">
  <div class="report-modal">
    <div class="rm-header">
      <div class="rm-title">实验报告 · <span>磁场能量</span></div>
      <div class="rm-close" onclick="closeReport()">×</div>
    </div>
    <div class="rm-body">
      <div class="rm-section-title">基本信息</div>
      <div class="rm-row">
        <div class="rm-field"><div class="rm-label">姓名 <span>*</span></div><input class="rm-input" id="rName" placeholder="请输入姓名"></div>
        <div class="rm-field"><div class="rm-label">学号 <span>*</span></div><input class="rm-input" id="rStuId" placeholder="请输入学号"></div>
      </div>
      <div class="rm-row">
        <div class="rm-field"><div class="rm-label">实验日期</div><input class="rm-input" id="rDate" type="date"></div>
        <div class="rm-field"><div class="rm-label">实验伙伴</div><input class="rm-input" id="rPartner" placeholder="可选"></div>
      </div>
      <div class="rm-section-title">实验内容</div>
      <div class="rm-field"><div class="rm-label">实验目的</div><textarea class="rm-textarea" id="rPurpose" placeholder="描述本次实验的目的和预期目标……"></textarea></div>
      <div class="rm-field"><div class="rm-label">实验步骤与观察</div><textarea class="rm-textarea" id="rProcess" placeholder="描述你进行的操作步骤和实验过程中的观察……" style="min-height:100px"></textarea></div>
      <div class="rm-field"><div class="rm-label">实验数据记录</div><textarea class="rm-textarea" id="rData" placeholder="记录关键数据、参数和仿真结果……"></textarea></div>
      <div class="rm-section-title">分析与总结</div>
      <div class="rm-field"><div class="rm-label">结果分析</div><textarea class="rm-textarea" id="rAnalysis" placeholder="对实验现象和数据进行分析……"></textarea></div>
      <div class="rm-field"><div class="rm-label">误差分析与思考</div><textarea class="rm-textarea" id="rError" placeholder="分析可能的误差来源，以及对物理规律的思考……"></textarea></div>
      <div class="rm-field"><div class="rm-label">实验结论</div><textarea class="rm-textarea" id="rConclusion" placeholder="总结本次实验的结论……"></textarea></div>
    </div>
    <div class="report-output" id="reportOutput"></div>
    <div class="rm-footer">
      <button class="rm-btn rm-btn-cancel" onclick="closeReport()">取消</button>
      <button class="rm-btn rm-btn-copy" id="rmCopyBtn" onclick="copyReport()">复制报告</button>
      <button class="rm-btn rm-btn-gen" onclick="generateReport()">生成报告</button>
    </div>
  </div>
</div>
<script>
(function(){
  const EXP_NAME='磁场能量';const EXP_SEC='§4-4';const STORE_KEY='phy26_report_'+EXP_SEC.replace(/[§\/]/g,'');
  function loadSaved(){const d=JSON.parse(localStorage.getItem(STORE_KEY)||'{}');if(d.name)document.getElementById('rName').value=d.name;if(d.stuId)document.getElementById('rStuId').value=d.stuId;if(d.date)document.getElementById('rDate').value=d.date;if(d.partner)document.getElementById('rPartner').value=d.partner;if(d.purpose)document.getElementById('rPurpose').value=d.purpose;if(d.process)document.getElementById('rProcess').value=d.process;if(d.data)document.getElementById('rData').value=d.data;if(d.analysis)document.getElementById('rAnalysis').value=d.analysis;if(d.error)document.getElementById('rError').value=d.error;if(d.conclusion)document.getElementById('rConclusion').value=d.conclusion;}
  function saveDraft(){const d={name:document.getElementById('rName').value,stuId:document.getElementById('rStuId').value,date:document.getElementById('rDate').value,partner:document.getElementById('rPartner').value,purpose:document.getElementById('rPurpose').value,process:document.getElementById('rProcess').value,data:document.getElementById('rData').value,analysis:document.getElementById('rAnalysis').value,error:document.getElementById('rError').value,conclusion:document.getElementById('rConclusion').value};localStorage.setItem(STORE_KEY,JSON.stringify(d));}
  window.openReport=function(){document.getElementById('reportOverlay').classList.add('open');document.getElementById('reportOutput').classList.remove('show');document.getElementById('rmCopyBtn').style.display='none';const dateEl=document.getElementById('rDate');if(!dateEl.value)dateEl.value=new Date().toISOString().slice(0,10);loadSaved();const _d={rPurpose:'研究磁场的能量储存，理解磁场能量密度ωm=B²/(2μ₀)的概念，验证电感储能公式W=LI²/2，分析RL电路放电时磁场能量转化为热能的过程。',rProcess:'构建RL电路，充电至稳态电流I₀=ε/R，然后断开电源，观察放电过程中电流I(t)=I₀e^{−t/τ}的衰减；计算不同时刻的磁场能量W=LI²/2；改变L和I₀，验证W∝L和W∝I²；观察螺线管内部磁场能量密度的分布。',rData:'RL电路（L=1H，R=2Ω，ε=10V）：稳态I₀=5A，W₀=LI₀²/2=12.5J；放电时τ=L/R=0.5s；t=τ时：I=5e⁻¹=1.84A，W=LI²/2=1.69J（剩余13.5%）；螺线管（n=1000匝/m，I=1A，截面A=0.01m²，长l=0.1m）：B=μ₀nI=1.26mT，ωm=B²/(2μ₀)=0.63J/m³，W=ωm·A·l=6.3×10⁻⁴J；与W=LI²/2=μ₀n²Al·I²/2=6.3×10⁻⁴J一致。',rAnalysis:'磁场能量储存在磁场本身中，能量密度ωm=B²/(2μ₀)（真空中）。电感储能W=LI²/2=∫(B²/2μ₀)dV，与电流平方成正比。RL电路放电时，磁场能量以热能形式耗散在电阻中，总耗散能量等于初始储能W₀=LI₀²/2，体现了能量守恒。',rError:'仿真中使用理想电感（无电阻），实际线圈有绕线电阻会导致额外能量损耗；螺线管端部磁场不均匀，实际储能略小于理论值；高频时需考虑涡流损耗和磁滞损耗。',rConclusion:'验证了电感储能公式W=LI²/2，磁场能量密度ωm=B²/(2μ₀)；磁场能量储存在磁场中，与电流平方成正比；RL电路放电时磁场能量转化为热能，总能量守恒；这一原理是储能电感、磁能存储装置的工作基础。'};Object.entries(_d).forEach(([id,val])=>{const el=document.getElementById(id);if(el&&!el.value)el.value=val;});};
  window.closeReport=function(){saveDraft();document.getElementById('reportOverlay').classList.remove('open');};
  window.overlayClick=function(e){if(e.target===document.getElementById('reportOverlay'))closeReport();};
  window.generateReport=function(){const name=document.getElementById('rName').value.trim();const stuId=document.getElementById('rStuId').value.trim();const date=document.getElementById('rDate').value||'—';const partner=document.getElementById('rPartner').value.trim()||'—';const purpose=document.getElementById('rPurpose').value.trim()||'（未填写）';const process=document.getElementById('rProcess').value.trim()||'（未填写）';const data=document.getElementById('rData').value.trim()||'（未填写）';const analysis=document.getElementById('rAnalysis').value.trim()||'（未填写）';const error=document.getElementById('rError').value.trim()||'（未填写）';const conclusion=document.getElementById('rConclusion').value.trim()||'（未填写）';if(!name||!stuId){alert('请填写姓名和学号');return;}saveDraft();const divider='─'.repeat(40);const report=['普通物理（卓越班）下册 · 电磁学',`实验报告：${EXP_NAME}（${EXP_SEC}）`,divider,`姓　　名：${name}　　　学　　号：${stuId}`,`实验日期：${date}　　　实验伙伴：${partner}`,divider,'','一、实验目的',purpose,'','二、实验步骤与观察',process,'','三、实验数据记录',data,'','四、结果分析',analysis,'','五、误差分析与思考',error,'','六、实验结论',conclusion,'',divider,`生成时间：${new Date().toLocaleString('zh-CN')}`,'本报告由 NUSEP26 普通物理（卓越班）实验仿真平台生成'].join('\n');const out=document.getElementById('reportOutput');out.textContent=report;out.classList.add('show');document.getElementById('rmCopyBtn').style.display='inline-flex';out.scrollIntoView({behavior:'smooth',block:'nearest'});};
  window.copyReport=function(){const text=document.getElementById('reportOutput').textContent;navigator.clipboard.writeText(text).then(()=>{const btn=document.getElementById('rmCopyBtn');const orig=btn.textContent;btn.textContent='✓ 已复制';setTimeout(()=>btn.textContent=orig,2000);}).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);const btn=document.getElementById('rmCopyBtn');btn.textContent='✓ 已复制';setTimeout(()=>btn.textContent='复制报告',2000);});};
  ['rName','rStuId','rDate','rPartner','rPurpose','rProcess','rData','rAnalysis','rError','rConclusion'].forEach(id=>document.getElementById(id).addEventListener('input',saveDraft));
})();
</script>
