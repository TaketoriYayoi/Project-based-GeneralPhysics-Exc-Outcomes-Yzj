  </div>

</div>
<div class="layout">
  <div class="sidebar">
    <div class="ctrl-group">
      <h3>外加电场</h3>
      <div class="slider-row">
        <label>E₀ = <span id="E0val">3</span> (相对单位)</label>
        <input type="range" id="E0slider" min="0" max="8" step="1" value="3" oninput="update()">
      </div>
    </div>
    <div class="divider"></div>
    <div class="ctrl-group">
      <h3>电介质类型</h3>
      <div class="dielec-grid">
        <div class="dielec-btn active" onclick="setDielec(this,'nonpolar',1.0,'非极性','无固有偶极矩')">非极性<br><small>εᵣ≈2</small></div>
        <div class="dielec-btn" onclick="setDielec(this,'polar',3.5,'极性','有固有偶极矩')">极性<br><small>εᵣ≈4</small></div>
        <div class="dielec-btn" onclick="setDielec(this,'glass',4.7,'玻璃','εᵣ=4.7')">玻璃<br><small>εᵣ=4.7</small></div>
        <div class="dielec-btn" onclick="setDielec(this,'water',80,'水','εᵣ=80')">水<br><small>εᵣ=80</small></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="toggle-row">
      <span>显示偶极子</span>
      <div class="toggle on" id="togDipole" onclick="togOpt('Dipole')"></div>
    </div>
    <div class="toggle-row" style="margin-top:8px">
      <span>显示极化电荷</span>
      <div class="toggle on" id="togPol" onclick="togOpt('Pol')"></div>
    </div>
    <div class="toggle-row" style="margin-top:8px">
      <span>显示合场强</span>
      <div class="toggle on" id="togTotal" onclick="togOpt('Total')"></div>
    </div>

      <h3>计算结果</h3>
      <div class="result-row"><span class="result-label">外加场 E₀</span><span><span class="result-value" id="resE0">—</span><span class="result-unit">单位</span></span></div>
      <div class="result-row"><span class="result-label">极化场 E'</span><span><span class="result-value" id="resEp">—</span><span class="result-unit">单位</span></span></div>
      <div class="result-row"><span class="result-label">合场强 E = E₀/εᵣ</span><span><span class="result-value" id="resE">—</span><span class="result-unit">单位</span></span></div>
      <div class="result-row"><span class="result-label">εᵣ</span><span><span class="result-value" id="resEr">—</span></span></div>

  <div class="canvas-wrap">
    <canvas id="dielecCanvas"></canvas>
    <div class="formula-bar">
      P = ε₀(εᵣ-1)E &nbsp;|&nbsp; σ' = P·n̂ &nbsp;|&nbsp; E_内 = E₀/εᵣ
    </div>

<script>
const canvas=document.getElementById('dielecCanvas');
const ctx=canvas.getContext('2d');

let er=2.0, erName='非极性', erDesc='无固有偶极矩', dielecType='nonpolar';
let showDipole=true, showPol=true, showTotal=true;

function setDielec(el,type,erVal,name,desc){
  document.querySelectorAll('.dielec-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  er=erVal; erName=name; erDesc=desc; dielecType=type;
  update();
}
function togOpt(name){
  if(name==='Dipole')showDipole=!showDipole;
  else if(name==='Pol')showPol=!showPol;
  else if(name==='Total')showTotal=!showTotal;
  document.getElementById('tog'+name).classList.toggle('on',eval('show'+name));
  update();
}

function update(){
  const E0=parseInt(document.getElementById('E0slider').value);
  document.getElementById('E0val').textContent=E0;
  const Ep=E0*(1-1/er);
  const E=E0/er;
  document.getElementById('resE0').textContent=E0.toFixed(1);
  document.getElementById('resEp').textContent=Ep.toFixed(2);
  document.getElementById('resE').textContent=E.toFixed(2);
  document.getElementById('resEr').textContent=er.toFixed(1);
  draw(E0,Ep,E);
}

function drawArrow(x1,y1,x2,y2,color,lw){
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=lw||1.5;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  const ang=Math.atan2(y2-y1,x2-x1),as=7;
  ctx.beginPath();ctx.moveTo(x2,y2);
  ctx.lineTo(x2-as*Math.cos(ang-0.4),y2-as*Math.sin(ang-0.4));
  ctx.lineTo(x2-as*Math.cos(ang+0.4),y2-as*Math.sin(ang+0.4));
  ctx.closePath();ctx.fill();
}

function draw(E0,Ep,E){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  const slabX=180, slabW=260, slabY=60, slabH=H-120;
  const cx=slabX+slabW/2;

  // capacitor plates
  ctx.fillStyle='rgba(239,68,68,0.5)';
  ctx.fillRect(60,slabY,30,slabH);
  ctx.fillStyle='rgba(56,189,248,0.5)';
  ctx.fillRect(W-90,slabY,30,slabH);

  // plate labels
  ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#f87171';ctx.fillText('+',75,H/2);
  ctx.fillStyle='#38bdf8';ctx.fillText('−',W-75,H/2);

  // dielectric slab
  const dAlpha=Math.min(0.08+er*0.01,0.25);
  ctx.fillStyle=`rgba(52,211,153,${dAlpha})`;
  ctx.fillRect(slabX,slabY,slabW,slabH);
  ctx.strokeStyle='rgba(52,211,153,0.4)';ctx.lineWidth=1.5;
  ctx.strokeRect(slabX,slabY,slabW,slabH);

  // dielectric label
  ctx.fillStyle='rgba(52,211,153,0.5)';ctx.font='13px "Microsoft YaHei"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(`${erName}  εᵣ = ${er}`,cx,slabY+8);

  // E0 arrows (outside slab)
  if(E0>0){
    const nArrows=4, arrowLen=25+E0*5;
    for(let i=0;i<nArrows;i++){
      const ay=slabY+20+i*(slabH-40)/(nArrows-1);
      // left region
      drawArrow(95,ay,slabX-10,ay,'rgba(255,200,60,0.8)',2);
      // right region
      drawArrow(slabX+slabW+10,ay,W-95,ay,'rgba(255,200,60,0.8)',2);
    }
    ctx.fillStyle='rgba(255,200,60,0.7)';ctx.font='bold 12px "Microsoft YaHei"';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(`E₀ = ${E0}`,slabX/2+48,slabY-4);
  }

  // dipoles inside slab
  if(showDipole && E0>0){
    const cols=6,rows=5;
    const dx=slabW/(cols+1), dy=slabH/(rows+1);
    const dipoleLen=Math.min(12+E0*2,28);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      const px=slabX+(c+1)*dx, py=slabY+(r+1)*dy;
      const jitter=(Math.sin(r*7+c*13)*6);
      const px2=px+jitter;
      // dipole arrow (− to +, i.e. left to right for E pointing right)
      const negX=px2-dipoleLen/2, posX=px2+dipoleLen/2;
      // neg end
      ctx.beginPath();ctx.arc(negX,py,3.5,0,Math.PI*2);
      ctx.fillStyle='rgba(56,189,248,0.7)';ctx.fill();
      // pos end
      ctx.beginPath();ctx.arc(posX,py,3.5,0,Math.PI*2);
      ctx.fillStyle='rgba(239,68,68,0.7)';ctx.fill();
      // bond
      ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(negX+4,py);ctx.lineTo(posX-4,py);ctx.stroke();
    }
  }

  // polarization surface charges
  if(showPol && E0>0){
    const nCharges=6;
    const sigmaScale=Math.min((er-1)*E0*0.5,8);
    for(let i=0;i<nCharges;i++){
      const py=slabY+20+i*(slabH-40)/(nCharges-1);
      // left face: negative bound charge
      ctx.beginPath();ctx.arc(slabX+8,py,Math.max(2,sigmaScale*0.7),0,Math.PI*2);
      ctx.fillStyle='rgba(56,189,248,0.7)';ctx.fill();
      ctx.fillStyle='rgba(56,189,248,0.9)';ctx.font='bold 10px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('−',slabX+8,py+1);
      // right face: positive bound charge
      ctx.beginPath();ctx.arc(slabX+slabW-8,py,Math.max(2,sigmaScale*0.7),0,Math.PI*2);
      ctx.fillStyle='rgba(239,68,68,0.7)';ctx.fill();
      ctx.fillStyle='rgba(239,68,68,0.9)';
      ctx.fillText('+',slabX+slabW-8,py+1);
    }
    // E' arrows (opposing E0)
    for(let i=0;i<3;i++){
      const ay=slabY+50+i*(slabH-100)/2;
      const epLen=8+Ep*8;
      drawArrow(cx+epLen/2,ay,cx-epLen/2,ay,'rgba(100,180,255,0.6)',1.5);
    }
    ctx.fillStyle='rgba(100,180,255,0.6)';ctx.font='12px "Microsoft YaHei"';
    ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(`E' (极化场)`,cx-4,slabY+slabH*0.75);
  }

  // total E inside
  if(showTotal && E0>0){
    const nArrows=4, arrowLen=20+E/er*8;
    for(let i=0;i<nArrows;i++){
      const ay=slabY+20+i*(slabH-40)/(nArrows-1);
      drawArrow(cx-40,ay,cx+40,ay,'rgba(255,130,60,0.85)',2.5);
    }
    ctx.fillStyle='rgba(255,130,60,0.85)';ctx.font='bold 12px "Microsoft YaHei"';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(`E = E₀/εᵣ = ${E.toFixed(2)}`,cx,slabY+slabH+18);
  }
}

function resizeCanvas(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;update();}
window.addEventListener('resize',resizeCanvas);
setTimeout(resizeCanvas,80);
</script>

    <div class="report-output" id="reportOutput"></div>
    <div class="rm-footer">
      <button class="rm-btn rm-btn-cancel" onclick="closeReport()">取消</button>
      <button class="rm-btn rm-btn-copy" id="rmCopyBtn" onclick="copyReport()">复制报告</button>
      <button class="rm-btn rm-btn-gen" onclick="generateReport()">生成报告</button>
    </div>
  </div>
</div>

<script>
(function(){
  const EXP_NAME = '电介质极化';
  const EXP_SEC  = '§2-2';
  const STORE_KEY = 'phy26_report_' + EXP_SEC.replace(/[§\/]/g,'');

  function loadSaved() {
    const d = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    if (d.name)       document.getElementById('rName').value      = d.name;
    if (d.stuId)      document.getElementById('rStuId').value     = d.stuId;
    if (d.date)       document.getElementById('rDate').value      = d.date;
    if (d.partner)    document.getElementById('rPartner').value   = d.partner;
    if (d.purpose)    document.getElementById('rPurpose').value   = d.purpose;
    if (d.process)    document.getElementById('rProcess').value   = d.process;
    if (d.data)       document.getElementById('rData').value      = d.data;
    if (d.analysis)   document.getElementById('rAnalysis').value  = d.analysis;
    if (d.error)      document.getElementById('rError').value     = d.error;
    if (d.conclusion) document.getElementById('rConclusion').value= d.conclusion;
  }

  function saveDraft() {
    const d = {
      name:       document.getElementById('rName').value,
      stuId:      document.getElementById('rStuId').value,
      date:       document.getElementById('rDate').value,
      partner:    document.getElementById('rPartner').value,
      purpose:    document.getElementById('rPurpose').value,
      process:    document.getElementById('rProcess').value,
      data:       document.getElementById('rData').value,
      analysis:   document.getElementById('rAnalysis').value,
      error:      document.getElementById('rError').value,
      conclusion: document.getElementById('rConclusion').value,
    };
    localStorage.setItem(STORE_KEY, JSON.stringify(d));
  }

  window.openReport = function() {
    document.getElementById('reportOverlay').classList.add('open');
    document.getElementById('reportOutput').classList.remove('show');
    document.getElementById('rmCopyBtn').style.display = 'none';
    const dateEl = document.getElementById('rDate');
    if (!dateEl.value) dateEl.value = new Date().toISOString().slice(0,10);
    loadSaved();
    const _d = {
      rPurpose:    '研究电介质在外电场中的极化现象，理解极化强度P与电场E的关系，观察极化电荷（束缚电荷）的分布，验证电介质中D=ε₀E+P=εE的关系。',
      rProcess:    '在平行板电容器中插入不同介电常数的电介质，观察极化电荷在介质表面的分布；改变外加电场强度，测量极化强度P的变化；比较有无电介质时电场强度E和电位移矢量D的变化；观察不同εᵣ材料的极化效果。',
      rData:       '真空中平行板电容器（d=1cm，V=100V）：E₀=10000V/m，D₀=ε₀E₀=8.85×10⁻⁸C/m²；插入εᵣ=4的电介质后（恒压）：E不变=10000V/m，D=ε₀εᵣE=3.54×10⁻⁷C/m²；极化强度P=D-ε₀E=ε₀(εᵣ-1)E=2.65×10⁻⁷C/m²；电容增大εᵣ=4倍。',
      rAnalysis:   '电介质极化的微观机制是分子电偶极矩在外场中的取向排列（取向极化）或正负电荷中心的相对位移（位移极化）。宏观上P=ε₀χₑE，χₑ为电极化率。电位移矢量D=ε₀E+P只与自由电荷有关，满足高斯定理∮D·dA=Q_free。',
      rError:      '仿真使用线性各向同性介质模型，忽略了实际材料的非线性、各向异性和频率依赖性；实际测量中温度变化会影响极化率；铁电体的极化存在滞后效应，仿真模型可能过于简化。',
      rConclusion: '电介质在外电场中发生极化，表面出现束缚电荷；极化强度P=ε₀χₑE，电位移矢量D=ε₀εᵣE；插入电介质后电容增大εᵣ倍；电介质的极化减弱了介质内部的电场（恒荷条件下）。',
    };
    Object.entries(_d).forEach(([id, val]) => { const el = document.getElementById(id); if (el && !el.value) el.value = val; });
  };

  window.closeReport = function() {
    saveDraft();
    document.getElementById('reportOverlay').classList.remove('open');
  };

  window.overlayClick = function(e) {
    if (e.target === document.getElementById('reportOverlay')) closeReport();
  };

  window.generateReport = function() {
    const name       = document.getElementById('rName').value.trim();
    const stuId      = document.getElementById('rStuId').value.trim();
    const date       = document.getElementById('rDate').value || '—';
    const partner    = document.getElementById('rPartner').value.trim() || '—';
    const purpose    = document.getElementById('rPurpose').value.trim() || '（未填写）';
    const process    = document.getElementById('rProcess').value.trim() || '（未填写）';
    const data       = document.getElementById('rData').value.trim() || '（未填写）';
    const analysis   = document.getElementById('rAnalysis').value.trim() || '（未填写）';
    const error      = document.getElementById('rError').value.trim() || '（未填写）';
    const conclusion = document.getElementById('rConclusion').value.trim() || '（未填写）';

    if (!name || !stuId) { alert('请填写姓名和学号'); return; }
    saveDraft();

    const divider = '─'.repeat(40);
    const report = [
      '普通物理（卓越班）下册 · 电磁学',
      `实验报告：${EXP_NAME}（${EXP_SEC}）`,
      divider,
      `姓　　名：${name}　　　学　　号：${stuId}`,
      `实验日期：${date}　　　实验伙伴：${partner}`,
      divider,
      '',
      '一、实验目的',
      purpose,
      '',
      '二、实验步骤与观察',
      process,
      '',
      '三、实验数据记录',
      data,
      '',
      '四、结果分析',
      analysis,
      '',
      '五、误差分析与思考',
      error,
      '',
      '六、实验结论',
      conclusion,
      '',
      divider,
      `生成时间：${new Date().toLocaleString('zh-CN')}`,
      '本报告由 NUSEP26 普通物理（卓越班）实验仿真平台生成',
    ].join('\n');

    const out = document.getElementById('reportOutput');
    out.textContent = report;
    out.classList.add('show');
    document.getElementById('rmCopyBtn').style.display = 'inline-flex';
    out.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  window.copyReport = function() {
    const text = document.getElementById('reportOutput').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('rmCopyBtn');
      const orig = btn.textContent;
      btn.textContent = '✓ 已复制';
      setTimeout(() => btn.textContent = orig, 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      const btn = document.getElementById('rmCopyBtn');
      btn.textContent = '✓ 已复制';
      setTimeout(() => btn.textContent = '复制报告', 2000);
    });
  };

  ['rName','rStuId','rDate','rPartner','rPurpose','rProcess','rData','rAnalysis','rError','rConclusion']
    .forEach(id => document.getElementById(id).addEventListener('input', saveDraft));
})();
</script>

</body>
</html>
